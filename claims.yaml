# claims.yaml — synth's load-bearing documentation claims, bound to evidence.
#
# Per the pulseengine-claude `claim-verification` skill: a README is a claim
# about the system — the same species as a requirement, pointing the other way.
# Each entry pins (a) the verbatim string as it appears in the doc, (b) evidence
# a machine RE-DERIVES from source (never a number typed only in prose), and
# (c) thereby the honest wording. CI runs `scripts/claim_check.py claims.yaml`;
# drift = red.
#
# When a proof lands / a rule lands / a roadmap status changes: update the doc
# AND this ledger in the same PR. Never "fix" a red gate by loosening the
# ledger while leaving the prose overclaim in place.
#
# Not bound here (deliberately — narrative or runtime-derived, gated elsewhere):
# the 141/141 ordeal-vs-Z3 agreement and 139/139 validator counts (re-derived
# by the CI `verify` job that actually runs them), the wasm spec-suite 227/257
# compile rate, and cycle/size numbers (gale silicon + differential jobs).

claims:
  # ---------------------------------------------------------------------------
  # Headline Rocq proof counts — the number that drifts fastest.
  # Was "298 Qed / 8 Admitted" in README/CLAUDE.md and "291" in coq/STATUS.md
  # while the tree held 470 (v0.31–v0.37 churn: VcrSelRules increments 2–4,
  # SailArmBridge, i64/flag lemmas). Fixed to derived truth in this PR.
  # 512 → 472 (#667 increment 2): the 40 VcrSelRulesGenCheck.v reflexivity
  # gate lemmas were retired when VcrSelRules.v started DEFINING rule_X :=
  # Gen.rule_X (generated single source) — the cross-check became vacuous and
  # its gate is subsumed by the 40 correctness Qed themselves.
  # ---------------------------------------------------------------------------
  - id: SYNTH-PROOF-COUNT-README
    doc: README.md
    text: "476 Qed / 5 Admitted"
    evidence:
      - kind: count-eq                       # ALL THREE README spots must agree —
        pattern: '476 Qed / 5 Admitted'      # a verbatim check alone greens if one
        glob: ['README.md']                  # of them drifts while another matches
        expect: 3
      - kind: count-eq
        pattern: 'Qed\.'
        glob: ['coq/Synth/**/*.v']
        expect: 476
      - kind: count-eq
        pattern: 'Admitted\.'
        glob: ['coq/Synth/**/*.v']
        expect: 5
      - kind: count-eq                       # the "+2 admit. tactics" disclosure
        pattern: '^\s*admit\.'
        glob: ['coq/Synth/**/*.v']
        expect: 2

  - id: SYNTH-PROOF-COUNT-CLAUDE-MD
    doc: CLAUDE.md
    text: "476 Qed / 5 Admitted"
    evidence:
      - kind: count-eq
        pattern: 'Qed\.'
        glob: ['coq/Synth/**/*.v']
        expect: 476
      - kind: count-eq
        pattern: 'Admitted\.'
        glob: ['coq/Synth/**/*.v']
        expect: 5

  - id: SYNTH-PROOF-COUNT-STATUS-MD
    doc: coq/STATUS.md
    text: "476 Qed / 5 Admitted"
    evidence:
      - kind: count-eq                       # headline + Total line must both agree
        pattern: '476 Qed / 5 Admitted'
        glob: ['coq/STATUS.md']
        expect: 2
      - kind: count-eq
        pattern: 'Qed\.'
        glob: ['coq/Synth/**/*.v']
        expect: 476
      - kind: count-eq
        pattern: 'Admitted\.'
        glob: ['coq/Synth/**/*.v']
        expect: 5

  # ---------------------------------------------------------------------------
  # The admit breakdown the docs disclose — per-file, so a new admit anywhere
  # (or a silent move between files) is visible, not just the total.
  # ---------------------------------------------------------------------------
  - id: SYNTH-ADMIT-BREAKDOWN
    doc: README.md
    text: "0 division admits"
    evidence:
      - kind: count-eq
        pattern: 'Admitted\.'
        glob: ['coq/Synth/Synth/CorrectnessI32.v']
        expect: 0
      - kind: count-eq
        pattern: 'Admitted\.'
        glob: ['coq/Synth/Synth/Compilation.v']
        expect: 2
      - kind: count-eq
        pattern: 'Admitted\.'
        glob: ['coq/Synth/Synth/CorrectnessSimple.v']
        expect: 1
      - kind: count-eq
        pattern: 'Admitted\.'
        glob: ['coq/Synth/ARM/ArmRefinement.v']
        expect: 2
      - kind: no-new                         # both admit. tactics live here
        pattern: '^\s*admit\.'
        glob: ['coq/Synth/ARM/ArmRefinement.v']
        recorded: 2

  # "0 i64 admits" (README + CLAUDE.md) — i64 T1 parity must not regress.
  - id: SYNTH-I64-ZERO-ADMITS
    doc: README.md
    text: "0 i64 admits"
    evidence:
      - kind: count-max
        pattern: 'Admitted\.'
        glob: ['coq/Synth/Synth/CorrectnessI64*.v']
        max: 0

  # The intro's scope claim: T1 for i32+i64 selection, T2-only for float/SIMD.
  - id: SYNTH-T1-SCOPE
    doc: README.md
    text: "cover the i32 and i64 instruction selection with result-correspondence (T1) proofs"
    evidence:
      - kind: file-exists
        path: coq/Synth/Synth/CorrectnessI32.v
      - kind: file-exists
        path: coq/Synth/Synth/CorrectnessI64.v
      - kind: verbatim                       # the honest scoping must stay next to it
        text: "float/SIMD selection has existence-only (T2) proofs"

  # ---------------------------------------------------------------------------
  # "verified"/"implemented" wording — bound to the roadmap yaml's status
  # field, never free-floating prose. rivet's status lifecycle is the source.
  # ---------------------------------------------------------------------------
  - id: SYNTH-VCR-RA-001-VERIFIED
    doc: README.md
    text: "allocator with liveness-based Belady spilling: `verified`"
    evidence:
      - kind: yaml-field
        path: artifacts/verified-codegen-roadmap.yaml
        id: VCR-RA-001
        field: status
        equals: verified

  - id: SYNTH-VCR-RA-001-VERIFIED-CLAUDE-MD
    doc: CLAUDE.md
    text: "`VCR-RA-001` allocator with Belady spilling — **verified,"
    evidence:
      - kind: yaml-field
        path: artifacts/verified-codegen-roadmap.yaml
        id: VCR-RA-001
        field: status
        equals: verified

  - id: SYNTH-VCR-VER-001-DEMONSTRATED
    doc: README.md
    text: "**demonstrated** (implemented; [evidence](scripts/repro/vcr_ver_001_gate.md))"
    evidence:
      - kind: yaml-field
        path: artifacts/verified-codegen-roadmap.yaml
        id: VCR-VER-001
        field: status
        equals: implemented
      - kind: file-exists
        path: scripts/repro/vcr_ver_001_gate.md

  # VCR-VER-002 (#166): trap-preservation gate over ordeal 0.9's trap module.
  # in-progress, not implemented. LIVE (derived-ARM-trap-term) classes now:
  # i32 div/rem, i64 div/rem (#756, field-derived), unreachable, i32
  # load/store (all widths), call_indirect, i32.trunc_f32_s/u, i32.trunc_f64_s/u
  # (#756, D-register guard). i64.trunc_f64 has no shipped lowering (selector
  # declines it) — its classifier is unit-gated only.
  # Phase B (ordeal 0.9.1, ordeal#59/TR-020): float→int trunc trap class
  # covered — trunc_op/trap_trunc wrapper + #709 boundary-table eval gate.
  - id: SYNTH-VCR-VER-002-STATUS
    doc: artifacts/verified-codegen-roadmap.yaml
    text: "Trap-preservation VC catches dropped WASM traps (i32+i64 div/rem, memory OOB, call_indirect, unreachable, float→int trunc); live-validator wiring in progress"
    evidence:
      - kind: yaml-field
        path: artifacts/verified-codegen-roadmap.yaml
        id: VCR-VER-002
        field: status
        equals: proposed
      - kind: file-exists
        path: crates/synth-verify/src/trap.rs
      - kind: file-exists
        path: crates/synth-verify/tests/trap_preservation.rs

  - id: SYNTH-VCR-SEL-001-STATUS
    doc: README.md
    text: "increments 1–4 shipped default-on (`SYNTH_SEL_DSL`, opt-out `SYNTH_NO_SEL_DSL=1`)"
    evidence:
      - kind: yaml-field
        path: artifacts/verified-codegen-roadmap.yaml
        id: VCR-SEL-001
        field: status
        equals: implemented

  - id: SYNTH-VCR-ISA-001-STATUS
    doc: README.md
    text: "approved — Sail/ASL bridge spike landed"
    evidence:
      - kind: yaml-field
        path: artifacts/verified-codegen-roadmap.yaml
        id: VCR-ISA-001
        field: status
        equals: approved
      - kind: count-eq                       # "92 Qed" bridge lemmas
        pattern: 'Qed\.'
        glob: ['coq/Synth/ARM/SailArmBridge.v']
        expect: 92

  # VCR-WASM-001 (Track B): WASM source semantics anchored on WasmCert-Coq.
  # Bounded first increment — 1 op (i32.add), 2 real-Qed refinement lemmas
  # (WasmCertBridge.v), establishing the pattern. The reference rule is a
  # hand transcription of WasmCert-Coq/CompCert Int.add with line-level
  # provenance (WasmCertReference.v); a real external dep + full fragment is
  # the named follow-up. The WASM-side analogue of SailArmBridge.v (ISA-001).
  - id: SYNTH-VCR-WASM-001-STATUS
    doc: artifacts/verified-codegen-roadmap.yaml
    text: "BOUNDED FIRST INCREMENT LANDED (v0.45, VCR-WASM-001)"
    evidence:
      - kind: yaml-field
        path: artifacts/verified-codegen-roadmap.yaml
        id: VCR-WASM-001
        field: status
        equals: implemented
      - kind: count-eq                       # the 2 refinement bridge lemmas
        pattern: 'Qed\.'
        glob: ['coq/Synth/WASM/WasmCertBridge.v']
        expect: 2
      - kind: file-exists
        path: coq/Synth/WASM/WasmCertReference.v

  # ---------------------------------------------------------------------------
  # Verified selector DSL coverage — the rule table, its manifest, and the
  # Qed theorems must stay 1:1. The STATUS.md coverage percentage's numerator
  # is the manifest rule count, never a prose number.
  # ---------------------------------------------------------------------------
  - id: SYNTH-SEL-DSL-RULES
    doc: README.md
    text: "41 rules / 41 Qed theorems"
    evidence:
      - kind: count-eq                       # rules in the manifest
        pattern: '^rule_'
        glob: ['coq/vcr_sel_rules.manifest']
        expect: 41
      - kind: count-eq                       # 1:1 Qed theorems in VcrSelRules.v
        pattern: '^(?:Theorem|Lemma) rule_\w+_correct'
        glob: ['coq/Synth/Synth/VcrSelRules.v']
        expect: 41
      - kind: count-max                      # the rule table carries no admits
        pattern: 'Admitted\.'
        glob: ['coq/Synth/Synth/VcrSelRules.v']
        max: 0

  - id: SYNTH-SEL-DSL-COVERAGE-STATUS-MD
    doc: coq/STATUS.md
    text: "**41 (26%)**"                     # DSL-served column total, per-op-family table (#667)
    evidence:
      - kind: count-eq
        pattern: '^rule_'
        glob: ['coq/vcr_sel_rules.manifest']
        expect: 41
      - kind: verbatim
        text: "**41 Qed / 0 Admitted**"

  - id: SYNTH-SEL-DSL-PILOT
    doc: README.md
    text: "7 Qed pilot lemmas"
    evidence:
      - kind: count-eq
        pattern: 'Qed\.'
        glob: ['coq/Synth/Synth/VcrSelPilot.v']
        expect: 7

  # ---------------------------------------------------------------------------
  # Trusted base — the axioms the Rocq suite rests on, re-counted, never
  # hand-maintained (STATUS.md said "41 axioms" while the tree held 93).
  # ---------------------------------------------------------------------------
  - id: SYNTH-AXIOM-BASE
    doc: coq/STATUS.md
    text: "**Total: 93 Axiom/Parameter declarations**"
    evidence:
      - kind: count-eq
        pattern: '^\s*(?:Axiom|Parameter) '
        glob: ['coq/Synth/**/*.v']
        expect: 93

  # ---------------------------------------------------------------------------
  # Other verification-track counts stated in the README.
  # ---------------------------------------------------------------------------
  - id: SYNTH-KANI-HARNESSES
    doc: README.md
    text: "18 bounded model checking harnesses for ARM encoder"
    evidence:
      - kind: count-eq
        pattern: '#\[kani::proof\]'
        glob: ['crates/**/*.rs']
        expect: 18

  - id: SYNTH-VERUS-SPECS
    doc: README.md
    text: "8 spec functions in `synth-synthesis/src/contracts.rs`"
    evidence:
      - kind: count-eq
        pattern: '^pub open spec fn '
        glob: ['crates/synth-synthesis/src/contracts.rs']
        expect: 8
