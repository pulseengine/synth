# Gale Integration Requirements (ASPICE SYS.2 / SWE.1)
#
# System: Synth -- WebAssembly-to-ARM Cortex-M AOT compiler
#
# Defines how synth-compiled WASM modules integrate with gale's formally
# verified kernel primitives for safety-critical embedded applications.
# Covers both the Zephyr module path (Phase 1: C FFI shim) and the
# Kiln host function path (Phase 2: direct Rust calls).
#
# Cross-repo references use gale: prefix for gale artifacts.
#
# Format: rivet generic-yaml

artifacts:
  # ---------------------------------------------------------------------------
  # System-level: gale integration architecture
  # ---------------------------------------------------------------------------

  - id: GI-001
    type: system-req
    title: Gale Zephyr module co-deployment with synth-compiled modules
    description: >
      Synth-compiled WASM modules shall be deployable alongside gale's
      formally verified kernel primitives in a single Zephyr application.
      The Zephyr build system (west build) shall compile both: (1) synth
      output (.s assembly files) via target_sources, and (2) gale's
      libgale_ffi.a via the Zephyr module system (zephyr/module.yml,
      CONFIG_GALE_KERNEL_SEM=y, etc.). The Zephyr C application code
      serves as the integration layer, calling synth-compiled WASM
      functions for application logic and using Zephyr kernel APIs
      (which delegate to gale for verified arithmetic) for synchronization.
      Both synth and gale target the same ARM triple
      (thumbv7em-none-eabihf for Cortex-M4F).
    status: draft
    tags: [gale, zephyr, co-deployment, integration]
    links:
      - type: derives-from
        target: BR-001
      - type: derives-from
        target: BR-003
      - type: refines
        target: ZI-001
      - type: traces-to
        target: gale:SYSREQ-SEM-001
      - type: traces-to
        target: gale:SYSREQ-MUT-001
    fields:
      req-type: interface
      priority: must
      verification-criteria: >
        Zephyr application builds with both synth .s files and gale
        Zephyr module enabled; application calls synth-compiled WASM
        function and gale-verified semaphore in the same main().

  - id: GI-002
    type: system-req
    title: Gale CMake Rust target triple compatibility with synth
    description: >
      Gale's Zephyr CMakeLists.txt and synth shall use compatible Rust
      target triple selection logic for ARM Cortex-M. Both projects use
      the same mapping: Cortex-M0 -> thumbv6m-none-eabi, Cortex-M3 ->
      thumbv7m-none-eabi, Cortex-M4/M7 without FPU -> thumbv7em-none-eabi,
      Cortex-M4/M7 with FPU -> thumbv7em-none-eabihf, Cortex-M33 ->
      thumbv8m.main-none-eabi[hf]. The target profile definitions in
      synth (TargetSpec, HardwareCapabilities) shall produce triples
      that match gale's CMakeLists.txt RUST_TARGET variable for the
      same Zephyr CONFIG_CPU_* selection.
    status: draft
    tags: [gale, target-triple, compatibility, cortex-m]
    links:
      - type: derives-from
        target: BR-003
      - type: refines
        target: TP-001
      - type: refines
        target: TP-004
      - type: refines
        target: TP-005
      - type: traces-to
        target: gale:STKH-001
    fields:
      req-type: interface
      priority: must
      verification-criteria: >
        For each supported Cortex-M variant, synth's TargetSpec::triple()
        matches gale's CMakeLists.txt RUST_TARGET for the same
        CONFIG_CPU_* / CONFIG_FPU combination.

  - id: GI-003
    type: system-req
    title: WASM task isolation via gale kernel primitives
    description: >
      Multi-component WASM applications compiled by synth shall use
      gale kernel primitives for inter-component synchronization and
      communication. Each WASM component instance runs in its own
      Zephyr thread with an MPU-isolated linear memory region. Gale
      provides the synchronization primitives: semaphores for producer-
      consumer signaling, mutexes for shared resource protection,
      message queues for typed inter-component messages, and pipes for
      byte-stream communication. The synth-compiled code accesses these
      primitives via kiln-builtins import dispatch, which routes to
      gale's Rust implementation (Phase 2) or via Zephyr C APIs that
      delegate to gale (Phase 1).
    status: draft
    tags: [gale, isolation, multi-component, wasm-tasks]
    links:
      - type: derives-from
        target: BR-001
      - type: refines
        target: FR-008
      - type: refines
        target: ZI-003
      - type: traces-to
        target: CM-005
      - type: traces-to
        target: gale:STKH-002
      - type: traces-to
        target: gale:SYSREQ-KILN-001
    fields:
      req-type: functional
      priority: should
      verification-criteria: >
        Two synth-compiled WASM components communicate via gale message
        queue on Renode Cortex-M4; MPU regions isolate each component's
        linear memory; semaphore coordinates execution order.

  - id: GI-004
    type: system-req
    title: Gale WIT interfaces for kernel object imports (Phase 2)
    description: >
      WIT interface definitions shall be created for gale kernel objects
      enabling WASM components to import kernel primitives as typed
      resources. The WIT interfaces define: resource sem (init, give,
      take, reset, count-get), resource mutex (lock, unlock),
      resource condvar (signal, broadcast, wait), resource msgq (put,
      get, peek), resource pipe (write, read), and resource stack (push,
      pop). These WIT definitions are consumed by meld for component
      lowering and by synth for canonical ABI stub generation. The WIT
      definitions match gale's Rust API signatures as specified in
      gale:SWREQ-KILN-001.
    status: draft
    tags: [gale, wit, component-model, kernel-objects, phase-2]
    links:
      - type: derives-from
        target: BR-003
      - type: refines
        target: CM-002
      - type: refines
        target: FR-001
      - type: traces-to
        target: gale:SWREQ-KILN-001
      - type: traces-to
        target: gale:SWREQ-KILN-002
    fields:
      req-type: interface
      priority: should
      verification-criteria: >
        WIT interfaces compile with wit-bindgen; canonical ABI lowering
        for each operation matches gale's Rust function signature;
        synth generates correct import stubs for each WIT operation.

  - id: GI-005
    type: system-req
    title: End-to-end verified compilation chain with gale
    description: >
      The end-to-end compilation chain shall maintain verified
      correctness from gale source through to ARM binary execution.
      The chain is: gale Rust source (Verus SMT proofs for functional
      correctness) -> gale plain/ (Rocq proofs for refinement properties)
      -> WASM (via Kiln host function registration) -> synth AOT
      compilation (Rocq proofs for ARM codegen correctness). Each link
      in the chain has formal verification: gale proves the kernel
      primitive is correct, synth proves the compilation preserves
      semantics. The gap is the Kiln host function boundary, which is
      covered by ABI compatibility tests (CM-001, CM-VER-002).
    status: draft
    tags: [gale, verified-pipeline, end-to-end, safety-critical]
    links:
      - type: derives-from
        target: BR-001
      - type: refines
        target: FR-006
      - type: traces-to
        target: gale:SYSREQ-KILN-002
      - type: traces-to
        target: gale:SWREQ-KILN-004
      - type: traces-to
        target: VER-001
    fields:
      req-type: safety
      priority: must
      verification-criteria: >
        Gale Verus proofs pass (all kernel primitives verified); synth
        Rocq proofs pass (all i32 operations T1-verified); ABI
        compatibility tests pass between synth-abi and kiln canonical
        ABI; no Admitted lemmas in critical path.

  # ---------------------------------------------------------------------------
  # SW-level requirements for gale integration in synth
  # ---------------------------------------------------------------------------

  - id: GI-TR-001
    type: sw-req
    title: Kernel object import stub generation for gale WIT interfaces
    description: >
      synth-synthesis shall generate ARM call stubs for gale kernel
      object WIT imports. Each kernel object operation (e.g., sem.give,
      mutex.lock) generates a BL to the corresponding kiln dispatch
      index. The stub handles canonical ABI lowering of the resource
      handle (u32 index) and operation-specific parameters. For Phase 1,
      the stubs target __meld_dispatch_import with the appropriate import
      index. For Phase 2 (per-import direct dispatch), the stubs target
      __meld_import_N with arguments directly in R0-R3.
    status: proposed
    tags: [gale, codegen, import-stub, wit]
    links:
      - type: derives-from
        target: GI-004
      - type: refines
        target: KB-TR-001
      - type: refines
        target: KB-TR-002
    fields:
      req-type: functional
      priority: should
      crate: synth-synthesis
      verification-criteria: >
        Synth compiles a WASM module importing sem.give to ARM code
        containing BL __meld_dispatch_import with correct import index;
        resource handle passed in R0 per AAPCS.

  - id: GI-TR-002
    type: sw-req
    title: Zephyr prj.conf generation with gale Kconfig
    description: >
      synth-cli shall support generating Zephyr project configuration
      (prj.conf) that includes gale Kconfig options alongside synth's
      requirements. When --gale-primitives=sem,mutex is specified, the
      generated prj.conf includes CONFIG_GALE_KERNEL_SEM=y and
      CONFIG_GALE_KERNEL_MUTEX=y in addition to CONFIG_PRINTK=y and
      CONFIG_CONSOLE=y. This simplifies the Zephyr project setup for
      applications using both synth and gale.
    status: proposed
    tags: [gale, zephyr, kconfig, cli]
    links:
      - type: derives-from
        target: GI-001
      - type: derives-from
        target: ZI-004
    fields:
      req-type: functional
      priority: could
      crate: synth-cli
      verification-criteria: >
        synth init-zephyr --gale-primitives=sem,mutex generates prj.conf
        with correct Kconfig settings; west build succeeds with the
        generated configuration.

  # ---------------------------------------------------------------------------
  # Verification for gale integration
  # ---------------------------------------------------------------------------

  - id: GI-VER-001
    type: sys-verification
    title: "Zephyr + synth + gale co-deployment test"
    description: >
      Integration test verifying that a Zephyr application can
      simultaneously use synth-compiled WASM functions and gale-verified
      kernel primitives. The test application: (1) calls a synth-compiled
      add function, (2) initializes a gale semaphore via Zephyr k_sem_init,
      (3) gives the semaphore, (4) takes the semaphore, (5) prints
      results via printk. This validates that libgale_ffi.a and synth
      assembly link without symbol conflicts and execute correctly
      together.
    status: proposed
    tags: [gale, integration-test, zephyr, co-deployment]
    links:
      - type: verifies
        target: GI-001
      - type: verifies
        target: GI-002
    fields:
      method: simulation
      preconditions:
        - Zephyr SDK available
        - Gale checkout at known path
        - synth-compiled .s file for test module
      steps:
        - "west build -b qemu_cortex_m3 with both synth and gale"
        - "Verify UART output: add result correct + sem give/take succeeds"
      pass-criteria: >
        Application builds with no linker errors; UART shows correct
        add result; k_sem_give and k_sem_take succeed using gale's
        verified implementation.

  - id: GI-VER-002
    type: sys-verification
    title: "Multi-component WASM isolation test with gale primitives"
    description: >
      End-to-end test verifying that two synth-compiled WASM components
      communicate via a gale message queue with MPU-isolated linear
      memories. Component A produces values and enqueues them via
      k_msgq_put (verified by gale MQ1-MQ13). Component B dequeues
      and processes values. Each component's linear memory is in a
      separate MPU region. The test validates: (1) message queue
      operations use gale-verified index arithmetic, (2) MPU fault
      occurs if one component accesses the other's memory, (3) correct
      values are transferred end-to-end.
    status: proposed
    tags: [gale, integration-test, isolation, multi-component]
    links:
      - type: verifies
        target: GI-003
      - type: verifies
        target: GI-005
    fields:
      method: simulation
      preconditions:
        - Renode with MPU emulation
        - Two synth-compiled WASM components
        - Gale message queue enabled
      steps:
        - "Build Zephyr application with two synth components + gale msgq"
        - "Run on Renode with MPU region monitoring"
        - "Verify values transfer correctly via message queue"
        - "Verify MPU fault on cross-component memory access"
      pass-criteria: >
        Messages transfer correctly via gale-verified msgq; MPU fault
        triggered on cross-component access; gale MQ index arithmetic
        proven correct via Verus proofs.

  # ---------------------------------------------------------------------------
  # Native-pointer ABI: host-pointer "dissolution" for loom-inlined seams
  # (synth #181 design / #237 implementation). Lets a loom-dissolved WASM seam
  # compile to a native-linkable object that drops into a gale/Zephyr C build
  # with no synth runtime: host pointers stay base=0 (native *ptr deref) while
  # wasm linear memory is relocated against __synth_wasm_data.
  # ---------------------------------------------------------------------------

  - id: GI-NPA-001
    type: system-req
    title: Native-pointer ABI for host-pointer drop-in seams
    description: >
      Under the opt-in `--native-pointer-abi`, synth shall compile a
      loom-dissolved WASM seam (e.g. gale's mutex_m.loom.wasm
      z_impl_k_mutex_unlock) into a native-linkable ELF object that runs
      with NO synth runtime. A host `*ptr` argument shall deref natively
      (linear-memory base = 0, set by the caller trampoline), while every
      wasm-resident static (a `(data)` byte or a zero-init variable such as
      a `static k_spinlock`) shall be addressed base-independently via a
      single `__synth_wasm_data` section symbol (R_ARM_MOVW_ABS_NC +
      R_ARM_MOVT_ABS). The object shall carry no dependency on a
      runtime-populated globals table (no R9-relative globals access).
    status: implemented
    tags: [gale, native-pointer-abi, host-integration, loom, dissolution]
    links:
      - type: refines
        target: GI-001
      - type: derives-from
        target: BR-003
      - type: traces-to
        target: gale:SYSREQ-MUT-001
    fields:
      req-type: interface
      priority: must
      verification-criteria: >
        gale's mutex_m.loom.wasm compiled with --native-pointer-abi
        --relocatable --all-exports yields an object with __synth_wasm_data
        MOVW/MOVT relocations, zero R9 references, and all imports/internal
        callees as THM_CALL relocations; default (no-flag) output unchanged.

  - id: GI-NPA-002
    type: sw-req
    title: Register-promote the stack-pointer global (self-contained SP)
    description: >
      A loom-dissolved seam reads its stack pointer from a wasm global
      `(global $__stack_pointer (mut i32) (i32.const N))`. Under
      `--native-pointer-abi` synth shall register-promote this global rather
      than lower it as a runtime globals-table access: `global.get $sp`
      materializes `__synth_wasm_data + N` (MOVW/MOVT, the real stack top),
      `global.set $sp` is eliminated as dead in a leaf, balanced function,
      and the global's initializer N doubles as the static-data base that
      separates pointer constants (`>= N`, relocated) from frame-size /
      offset scalars (`< N`, plain immediate). The decoder shall capture
      each global's initializer + mutability to enable this. This promotion
      is gated on the presence of a stack-pointer global (without one the
      base is 0 and the value/address split is undecidable, so the
      transform is unsound and shall not fire).
    status: implemented
    tags: [gale, native-pointer-abi, stack-pointer, register-promotion]
    links:
      - type: derives-from
        target: GI-NPA-001
    fields:
      req-type: functional
      priority: must
      verification-criteria: >
        Unit tests test_237_stack_pointer_global_is_register_promoted and
        test_decode_captures_global_initializer pass; gmutex object shows
        the SP read as __synth_wasm_data-relative with no R9 access.

  - id: GI-NPA-003
    type: sw-req
    title: Non-leaf stack-pointer persistence across internal calls (planned)
    description: >
      Extend GI-NPA-002 beyond the leaf, balanced case: a non-leaf function
      that makes an internal WASM call across a persisted stack-pointer
      change must keep the promoted SP value in a callee-saved register that
      survives the call (the wasm global outliving a single `global.get`).
      This is the analogue of the RISC-V leaf-only -> non-leaf arc and is
      the next increment to be implemented alongside gale once a non-leaf
      host-pointer seam is exercised. Until then, synth covers leaf seams
      (gale's exported mutex/sem seams, whose only calls are host imports).
    status: proposed
    tags: [gale, native-pointer-abi, non-leaf, follow-up, planned]
    links:
      - type: derives-from
        target: GI-NPA-001
    fields:
      req-type: functional
      priority: should
      verification-criteria: >
        A non-leaf host-pointer seam compiled with --native-pointer-abi
        preserves the promoted SP across internal wasm calls and matches the
        wasmtime reference under the differential oracle.

  - id: GI-NPA-VER-001
    type: sys-verification
    title: "Object-level oracle: gmutex self-containment (clean-room confirmed)"
    description: >
      Independent (clean-room) verification that the native-pointer ABI
      produces a self-contained object for gale's mutex_m.loom.wasm. A fresh
      build compiled gmutex with --native-pointer-abi --relocatable
      --all-exports and adjudicated: (C1) the SP read is materialized via
      R_ARM_MOVW_ABS_NC + R_ARM_MOVT_ABS vs __synth_wasm_data; (C2) zero R9
      references in the disassembly; (C3) __synth_wasm_data defined in .bss;
      (C5) no __synth_wasm_data relocations without the flag (opt-in);
      (C7) 12 __synth_wasm_data relocations total. All confirmed by an
      isolated oracle subagent; control_step frozen fixture bit-identical.
    status: implemented
    tags: [gale, native-pointer-abi, oracle, clean-room, differential]
    links:
      - type: verifies
        target: GI-NPA-001
    fields:
      method: analysis
      preconditions:
        - "synth binary built (cargo build -p synth-cli)"
        - "arm-none-eabi-objdump available"
        - "gale mutex_m.loom.wasm at /tmp/gmutex.wasm"
      steps:
        - "Compile gmutex with --native-pointer-abi --relocatable --all-exports"
        - "objdump -r: confirm __synth_wasm_data MOVW/MOVT relocs (count 12)"
        - "objdump -d: confirm zero r9 references"
        - "objdump -t: confirm __synth_wasm_data in .bss"
        - "Compile without the flag: confirm zero __synth_wasm_data relocs"
      pass-criteria: >
        C1, C2, C3, C5, C7 all CONFIRMED by an independent oracle;
        control_step frozen fixture stays bit-identical (13/13,
        control_step_differential.py ORACLE PASS).

  - id: GI-NPA-VER-002
    type: sw-verification
    title: "Unit tests: global capture + stack-pointer register-promotion"
    description: >
      Unit-level verification of the SP register-promotion mechanism:
      test_decode_captures_global_initializer (decoder captures the global
      initializer + mutability), test_237_stack_pointer_global_is_register_promoted
      (global.get $sp relocates to __synth_wasm_data, the static-pointer const
      relocates, the frame-size const 16 stays a plain immediate, and the
      promoted global never touches R9), and
      test_237_static_store_is_symbol_relative_under_native_pointer_abi (the
      gating that keeps the value/address split sound when no SP global is
      present).
    status: implemented
    tags: [gale, native-pointer-abi, unit-test, soundness]
    links:
      - type: verifies
        target: GI-NPA-002
    fields:
      method: test
      preconditions:
        - "cargo test workspace"
      steps:
        - "cargo test -p synth-core test_decode_captures_global_initializer"
        - "cargo test -p synth-synthesis test_237_stack_pointer_global_is_register_promoted"
        - "cargo test -p synth-synthesis test_237_static_store_is_symbol_relative_under_native_pointer_abi"
      pass-criteria: >
        All three tests report 'test result: ok'.

  - id: GI-NPA-VER-003
    type: sys-verification
    title: "On-target differential: dissolved gmutex vs native reference (planned)"
    description: >
      End-to-end verification that the native-pointer-ABI object, linked
      with gale's host trampoline (push {r11,lr}; mov.w r11,#0; bl; pop)
      and the kiln bridge, executes correctly on the target / emulator and
      matches the native reference behavior (native ref 124) for
      z_impl_k_mutex_unlock. This is the gale-side validation step that
      closes synth #237 together with GI-NPA-003 (non-leaf support).
    status: proposed
    tags: [gale, native-pointer-abi, on-target, differential, planned]
    links:
      - type: verifies
        target: GI-NPA-001
    fields:
      method: simulation
      preconditions:
        - "gmutex object compiled with --native-pointer-abi"
        - "gale host trampoline + kiln bridge"
        - "qemu/Renode Cortex-M4 or hardware"
      steps:
        - "Link gmutex.o + kiln_bridge.o + gale trampoline"
        - "Execute z_impl_k_mutex_unlock under emulation"
        - "Compare result/side-effects against the native reference (124)"
      pass-criteria: >
        Linked dissolved seam runs with no runtime and matches the native
        reference behavior; no MPU fault from mis-addressed statics or stack.
