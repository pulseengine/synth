  - id: VCR-SEL-003
    type: sw-req
    title: Multi-value-return ABI — multi-result call feeding select (selector op-gap, gale #329)
    description: >
      `synth compile --cortex-m --all-exports` silently skips a function when a
      multi-value `call` result feeds a `select` (falcon-flight func_39; func_30
      LocalSet one consumer over) — on a module `wasm-tools validate` accepts.
      Root cause is two-sided and confirmed from source @ v0.11.40: (1) caller —
      the `Call` arm (instruction_selector.rs ~7252) pushes exactly ONE operand
      per call regardless of result count (no `func_ret_count` metadata is
      threaded; only `func_ret_i64` exists), so `select` (pops 3) underflows in
      `pop_operand`; (2) callee — multi-value return is unimplemented: `$two`
      emits `movs r4,#10; movs r5,#20; bx lr`, leaving results in r4/r5, not the
      AAPCS return registers r0/r1. The two sides MUST land together: a
      caller-only push would compile-but-MISCOMPILE (read r0/r1, callee wrote
      r4/r5), converting today's safe skip into silent wrong-code. This is the
      "selector missed an op" class (VCR-SEL-001), not a one-line patch — it
      needs result-count metadata threaded through both codegen paths, an N-result
      push at call sites, and multi-result placement in r0..r(N-1) in both the
      explicit `Return` and the implicit fall-through epilogue. Non-blocking: no
      shipped wasm-cross-LTO module hits this shape (gale concurs). Regression
      lock landed in tests/fixtures/multivalue_call_select (PR #330).
    status: proposed
    tags: [codegen, selector, instruction-selection, multi-value, abi, op-gap, gale-329, track-a]
    links:
      - type: derives-from
        target: VCR-001
      - type: traces-to
        target: VCR-SEL-001
    fields:
      req-type: functional
      priority: should
      verification-criteria: >
        repro_call_select.wat compiles AND `f` evaluates to the wasmtime golden
        (f(1)=10, f(0)=20) on a differential RUN — not merely "it compiles"; the
        three control fixtures stay compiling; >register-capacity result counts
        (>4 int results / memory-return-area) stay a clean skip, never a
        miscompile; the three frozen differentials (control_step 0x00210A55 /
        flight_seam 0x07FDF307 / div_const 338/338) remain RESULT-identical.

  - id: VCR-SEL-004
    type: sw-req
    title: Compare→select/br_if fusion — drop the bool-materialize+re-test flag round-trip (gale #209)
    description: >
      synth lowers each wasm op independently, so an `i32` comparison whose result
      feeds a `select`/`br_if` is materialized into a GPR bool (ITE + two movCC)
      and then RE-TESTED (`cmp #0`) to recover a condition the original comparison
      already set — `cmp <real>; ite; movCC #1/#0; cmp #0; it; movCC` = 7
      instructions where 3 suffice (`cmp <real>; it CC; movCC` / a predicated
      branch). gale #209 measured this on `control_step_decide`: 6 re-test sites,
      ~4 removable insns each ≈ 24 cyc ≈ 29% of the 84-cyc gap to native, and it
      recurs in every dissolved body with a comparison feeding a select
      (controller_step/filter_axis clamps, k_sem_give). Fix: a LATE peephole —
      when an i32 comparison's result is sole-consumed by a select/br_if in the
      same block with no intervening flag clobber, keep the condition in NZCV and
      emit the consumer as a single predicated movCC / conditional branch.
      Detection is local (def = comparison, single use = select/br_if), so it
      fits the existing SelectMove + reg_effect flag modeling (#279) without a
      flag-liveness rework. Byte-changing → deliberate fixture re-freeze. The
      companion finding (21% [sp] spill density on the sem path) is the VCR-RA
      allocator track, not this item.
      RE-CONFIRMED on v0.12.0 (gale #428, 2026-06-23): with loom v1.1.16's
      inline+DCE merging the gust_mix export wrapper (loom#228), gale isolated the
      gap to synth — gust_mix 2.81× → 2.63× LLVM (fn-only 1.125 → 1.05 ticks/call),
      frame 24 B → 8 B; "synth is now the SOLE remaining factor." The merged
      gust_mix lowered by synth 0.12.0 still shows the materialized-bool clamps
      (`cmp r4,r5; ite lt; movlt #1; movge #0; cmp #0; it ne; movne` ×2). gale
      re-ranks THIS (#4 cmp→select → IT-block predication) as the HIGHEST single
      win (~7 insns → 2-3, ×2 here), ahead of (3) immediate folding (`lsl #8` /
      `uxth` for the `movw r5,#8; lsl` and `movw r3,#0xffff; and` it also flagged)
      and (1) wiring the now-CI-gated allocator (#441) to drop the 6-reg leaf
      prologue. v0.12.0 shipped the DWARF (#440) + spill-pressure CI-gate (#441,
      regalloc GROUNDWORK/measurement — NOT a lowering fix) but not this. This is
      the NEXT DEDICATED GATED RELEASE (not an idle-tick increment): implement the
      late peephole, re-freeze the three frozen differentials (0x00210A55 /
      0x07FDF307 / divseam) result-identical, differential oracle, then gale's
      `benches/gust/src/bin/gust_codegen_bench.rs` (≤1.3× fn-only) is the agreed
      on-silicon kill-criterion.
      IMPLEMENTATION LANDED — SELECT HALF ONLY (2026-06-23, flag-off /
      frozen-safe). SCOPE: this PR lands the `select`→`movCC` half of the
      title's "select/br_if" fusion. The `br_if`→predicated-BRANCH half (a
      comparison sole-consumed by a conditional branch → keep NZCV, emit a single
      `bCC`) is NOT done — `fuse_cmp_select` matches only `SelectMove` consumers;
