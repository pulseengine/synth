  - id: VCR-COV-001
    type: sw-req
    title: "MC/DC source-to-object traceability: synth's branch folding changes witness's decision set (synth #396)"
    description: >
      synth #396: witness measures MC/DC by instrumenting WASM branches, but
      synth's WASM→ARM lowering CHANGES the branch set, so the WASM-level MC/DC
      does not 1:1 represent the OBJECT code's structural coverage (DO-178C
      6.4.4.2 / ISO 26262 ASIL D source-to-object obligation). Three directions,
      all present in synth today (select→cmov, the #390 pass-4 compare→br_if
      fusion, i64-compare, br_table):
        (1) FOLD to predication — a WASM decision becomes branchless (no PC
            branch). SAFE: WASM-level MC/DC stays authoritative; the object code
            realizes the same decision via a flag, no untraceable branch.
        (2) ELIMINATE a provably-constant branch — one side unreachable ⇒ MC/DC
            infeasible by construction. Needs JUSTIFICATION, and scry's
            constant-condition/reachability analysis is the sound evidence that
            the dead side is justified-deactivated, not a coverage hole.
        (3) SPLIT into N object branches (i64 cmp → cmp/bne/cmp; br_table →
            ladder) — compiler-INTRODUCED branches. Needs object-level MC/DC OR a
            faithful-implementation argument that the source decision's vectors
            cover them. The one direction that genuinely ADDS obligations.
      FIX = the SAME provenance spine as VCR-DBG-001 (#394): synth emits a
      decision-provenance map per WASM decision (br_if/select/if/br_table) →
      {1:1 branch | folded-predication | eliminated-constant(+scry evidence) |
      split-into-N}. One mechanism (the source_line threading already present),
      two consumers — the debugger (DWARF) and a coverage reconciler (witness).
      The reconciler keeps WASM MC/DC authoritative for (1), marks scry-proven
      dead branches justified for (2), flags (3) for object coverage.
      Coordinate with witness (consume the map) + scry (dead-branch evidence,
      ties to VCR-RA-010 / scry#51).
    status: proposed
    tags: [toolchain, mcdc, structural-coverage, do-178c, witness-coordination, scry, traceability, synth-396]
    links:
      - type: derives-from
        target: VCR-001
      - type: refines
        target: VCR-DBG-001
      - type: constrained-by
        target: VCR-RA-010
      # scry FEAT-023 / REQ-012 (shipped v1.13.0, 2026-06-20): per-program-point
      # `operand_stack: Vec<AbstractValue>`. A decision's CONDITION values live on
      # the operand stack, so this is the granularity the MC/DC reconciler needs
      # to classify a folded/eliminated branch precisely (synth#396 / witness#109).
      - type: traces-to
        target: scry:REQ-012
    fields:
      req-type: functional
      priority: should
      verification-criteria: >
        A synth-compiled module's witness MC/DC truth table reconciles against
        the ARM object code via the decision-provenance map: every WASM decision
        is classified (folded / eliminated / split / 1:1); folded decisions keep
        their WASM-level obligation; scry-proven-dead branches are marked
        justified-infeasible (not gaps); split decisions either get object-level
        MC/DC or a recorded faithful-implementation argument. No object branch is
        untraceable to a source decision. Frozen fixtures bit-identical (the map
        is emitted metadata, not a codegen change).

  - id: VCR-DMA-001
    type: sw-req
    title: Volatile DMA segment — loads/stores in a marked range not cached or reordered
    description: >
      An integrator can mark a segment of the fused linear memory as VOLATILE —
      the DMA transfer window. During a DMA-owned window an external agent (the
      DMA engine, which gale models as a Component-Model `own<buffer>` handoff,
      gale#124) rewrites the segment out-of-band, so synth must treat that byte
      range `[base, base+len)` as volatile: a load or store whose address falls
      inside a marked range must NOT be cached, hoisted, common-subexpression-
      eliminated, or reordered across the transfer boundary — each access
      re-materializes its address and re-issues the memory operation. gale's
      decision DD-DMA-REGION-001 places the DMA buffer in a dedicated shared
      segment precisely so the range is concrete and verifier-visible.

      PHASE 1 (LANDED — flag + plumbing + traceability): synth accepts
      `--volatile-segment <base>:<len>` (hex or decimal, repeatable), parses it
      into `CompileConfig.volatile_segments` (crates/synth-core/src/backend.rs),
      and threads it to codegen.

      PHASE 2 (LANDED — the codegen back-off, #543): the optimizer's
      address-caching passes HONOR the ranges. (a) The #468 base-CSE /
      const-address-fold (`SYNTH_BASE_CSE`, `optimizer_bridge::plan_base_cse`)
      excludes any const-address access whose 4-byte window intersects a marked
      range from its fold set — the access keeps its verbatim per-access
      materialize-and-access codegen while accesses outside the range still fold
      (surgical, per-access). Dynamic (statically-unknown) addresses were never
      fold candidates, so they always stay verbatim — the conservative stance.
      (b) const-CSE (`SYNTH_CONST_CSE`, both the bridge-level cache and
      `liveness::apply_const_cse`) declines WHOLESALE while any range is marked:
      a cached constant cannot be classified address-vs-data at that level, so
      every constant is re-materialized at each occurrence (conservative v1).
      Nothing else on the pipeline deletes, forwards, or reorders a linear-memory
      access (IR CSE deliberately never CSEs MemLoads; DCE removes only
      unreachable blocks; the frame-slot passes are SP-relative-only, and linmem
      is never a frame slot), so every marked access is issued verbatim, in
      program order. Empty ranges (the default) change nothing by construction —
      the frozen-codegen byte gate holds untouched. Oracles:
      crates/synth-cli/tests/volatile_segment_phase2_543.rs (red→green byte
      lattice, red-confirmed against pre-change main) and
      scripts/repro/volatile_segment_543_differential.py (unicorn-vs-wasmtime:
      ranges preserve RESULTS, only access patterns change).

      Deferred follow-up: honoring a wasm custom-section convention meld emits
      (so the range travels with the module) in addition to the explicit CLI
      flag (#543 option 2).
    status: implemented
    tags: [dma, volatile, memory, codegen, const-cse, base-cse, gale-integration, synth-543, phase-2]
    links:
      - type: derives-from
        target: VCR-001
      - type: constrained-by
        target: VCR-RA-001
    fields:
      req-type: functional
      priority: should
      verification-criteria: >
        Tracks GitHub issue #543 (see description + `synth-543` tag).
        Phase 1 (met): `--volatile-segment 0x20001000:4096` parses into
        `CompileConfig.volatile_segments` with base=0x20001000 and len=4096;
        malformed input (`--volatile-segment garbage`) is rejected with a
        non-zero exit and a descriptive error; on the DEFAULT configuration a
        compile WITH the flag is `.text`-byte-identical to one WITHOUT it.
        Phase 2 (met): const-CSE and the #468 base-CSE decline for accesses
        overlapping a marked range — the red→green byte-lattice oracle
        (volatile_segment_phase2_543.rs: folded < window < baseline .text, and
        a full-coverage range byte-identical to the lever never firing) FAILS
        on pre-change main and passes after; the unicorn-vs-wasmtime
        differential (volatile_segment_543_differential.py) proves the ranges
        preserve results in all four build modes; every marked access is issued
        verbatim in program order (no pass deletes/forwards/reorders linmem
        accesses). No frozen fixture uses the flag, so no re-freeze was needed
        (frozen anchors pass untouched).
