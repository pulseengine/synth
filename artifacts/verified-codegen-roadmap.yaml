  - id: VCR-SEL-003
    type: sw-req
    title: Multi-value-return ABI — multi-result call feeding select (selector op-gap, gale #329)
    description: >
      `synth compile --cortex-m --all-exports` silently skips a function when a
      multi-value `call` result feeds a `select` (falcon-flight func_39; func_30
      LocalSet one consumer over) — on a module `wasm-tools validate` accepts.
      Root cause is two-sided and confirmed from source @ v0.11.40: (1) caller —
      the `Call` arm (instruction_selector.rs ~7252) pushes exactly ONE operand
      per call regardless of result count (no `func_ret_count` metadata is
      threaded; only `func_ret_i64` exists), so `select` (pops 3) underflows in
      `pop_operand`; (2) callee — multi-value return is unimplemented: `$two`
      emits `movs r4,#10; movs r5,#20; bx lr`, leaving results in r4/r5, not the
      AAPCS return registers r0/r1. The two sides MUST land together: a
      caller-only push would compile-but-MISCOMPILE (read r0/r1, callee wrote
      r4/r5), converting today's safe skip into silent wrong-code. This is the
      "selector missed an op" class (VCR-SEL-001), not a one-line patch — it
      needs result-count metadata threaded through both codegen paths, an N-result
      push at call sites, and multi-result placement in r0..r(N-1) in both the
      explicit `Return` and the implicit fall-through epilogue. Non-blocking: no
      shipped wasm-cross-LTO module hits this shape (gale concurs). Regression
      lock landed in tests/fixtures/multivalue_call_select (PR #330).
    status: proposed
    tags: [codegen, selector, instruction-selection, multi-value, abi, op-gap, gale-329, track-a]
    links:
      - type: derives-from
        target: VCR-001
      - type: traces-to
        target: VCR-SEL-001
    fields:
      req-type: functional
      priority: should
      verification-criteria: >
        repro_call_select.wat compiles AND `f` evaluates to the wasmtime golden
        (f(1)=10, f(0)=20) on a differential RUN — not merely "it compiles"; the
        three control fixtures stay compiling; >register-capacity result counts
        (>4 int results / memory-return-area) stay a clean skip, never a
        miscompile; the three frozen differentials (control_step 0x00210A55 /
        flight_seam 0x07FDF307 / div_const 338/338) remain RESULT-identical.

  - id: VCR-SEL-004
    type: sw-req
    title: Compare→select/br_if fusion — drop the bool-materialize+re-test flag round-trip (gale #209)
    description: >
      synth lowers each wasm op independently, so an `i32` comparison whose result
      feeds a `select`/`br_if` is materialized into a GPR bool (ITE + two movCC)
      and then RE-TESTED (`cmp #0`) to recover a condition the original comparison
      already set — `cmp <real>; ite; movCC #1/#0; cmp #0; it; movCC` = 7
      instructions where 3 suffice (`cmp <real>; it CC; movCC` / a predicated
      branch). gale #209 measured this on `control_step_decide`: 6 re-test sites,
      ~4 removable insns each ≈ 24 cyc ≈ 29% of the 84-cyc gap to native, and it
      recurs in every dissolved body with a comparison feeding a select
      (controller_step/filter_axis clamps, k_sem_give). Fix: a LATE peephole —
      when an i32 comparison's result is sole-consumed by a select/br_if in the
      same block with no intervening flag clobber, keep the condition in NZCV and
      emit the consumer as a single predicated movCC / conditional branch.
      Detection is local (def = comparison, single use = select/br_if), so it
      fits the existing SelectMove + reg_effect flag modeling (#279) without a
      flag-liveness rework. Byte-changing → deliberate fixture re-freeze. The
      companion finding (21% [sp] spill density on the sem path) is the VCR-RA
      allocator track, not this item.
      RE-CONFIRMED on v0.12.0 (gale #428, 2026-06-23): with loom v1.1.16's
      inline+DCE merging the gust_mix export wrapper (loom#228), gale isolated the
      gap to synth — gust_mix 2.81× → 2.63× LLVM (fn-only 1.125 → 1.05 ticks/call),
      frame 24 B → 8 B; "synth is now the SOLE remaining factor." The merged
      gust_mix lowered by synth 0.12.0 still shows the materialized-bool clamps
      (`cmp r4,r5; ite lt; movlt #1; movge #0; cmp #0; it ne; movne` ×2). gale
      re-ranks THIS (#4 cmp→select → IT-block predication) as the HIGHEST single
      win (~7 insns → 2-3, ×2 here), ahead of (3) immediate folding (`lsl #8` /
      `uxth` for the `movw r5,#8; lsl` and `movw r3,#0xffff; and` it also flagged)
      and (1) wiring the now-CI-gated allocator (#441) to drop the 6-reg leaf
      prologue. v0.12.0 shipped the DWARF (#440) + spill-pressure CI-gate (#441,
      regalloc GROUNDWORK/measurement — NOT a lowering fix) but not this. This is
      the NEXT DEDICATED GATED RELEASE (not an idle-tick increment): implement the
      late peephole, re-freeze the three frozen differentials (0x00210A55 /
      0x07FDF307 / divseam) result-identical, differential oracle, then gale's
      `benches/gust/src/bin/gust_codegen_bench.rs` (≤1.3× fn-only) is the agreed
      on-silicon kill-criterion.
    status: proposed
    tags: [codegen, selector, peephole, compare-select, flag-fusion, gale-209, perf, track-b]
    links:
      - type: derives-from
        target: VCR-001
      - type: traces-to
        target: VCR-SEL-001
    fields:
      req-type: functional
      priority: should
      verification-criteria: >
        A re-decode of control_step_decide shows NO `cmp <real>; ite; movCC #1/#0;
        cmp #0; it; movCC` round-trip for a comparison feeding a select (gale's
        kill-criterion); the three frozen differentials stay RESULT-identical
        (bytes re-froze, results preserved); gale confirms on-silicon
        control_step drops toward ~127 cyc (151 − ~24) and k_sem_give materially
        below 860 on the G474RE; flag-gated until that silicon confirmation.

  - id: VCR-RA-002
    type: sw-req
    title: Conditional register pool — free R10 when bounds-checking is off (track C)
    description: >
      R10 is reserved unconditionally ("memory size for bounds checks") but used
      ONLY in BoundsCheckConfig::{Software,Mpu,Masking} (verified:
      instruction_selector.rs ~3952). In BoundsCheckConfig::None it is a wasted
      reserve — a cheap +1 allocatable register (pool 9 -> 10) that directly
      relieves the const-remat/spill pressure the 9-register limit forces (the
      9-vs-12 gap to native). Make R10 allocatable iff bounds-checking is off.
      Composes with the allocator (which reads the pool size from config).
    status: proposed
    tags: [codegen, register-allocation, pool, reserved-registers, track-c, perf, release-v0.11.41]
    links:
      - type: derives-from
        target: VCR-001
    fields:
      req-type: functional
      priority: should
      verification-criteria: >
        With bounds-checking off, R10 is allocatable and flat_flight spill count
        decreases; all three differentials RESULT-identical; with bounds-checking
        ON, R10 stays reserved and bounds-mode codegen is byte-identical; gale
        confirms on-target equal-or-better. Deliberate fixture re-freeze (bytes
        change, result preserved) is part of landing it, not a violation.

  # ---------------------------------------------------------------------------
  # Research-driven additions (deep-research run wf_2310ef0b-097, 2026-06-10:
  # Crocus/regalloc2/CompCert-validation literature, 103 agents, 25 claims
  # adversarially verified). The headline: per-run translation VALIDATION with
  # a small mechanically-verified validator is the literature-consensus sweet
  # spot (Rideau/Leroy CC'10: equal soundness, ~10x less proof, invented for
  # register-poor targets) — so the validator, not the allocator, is the thing
  # to verify.
  # ---------------------------------------------------------------------------

  - id: VCR-RA-003
    type: sw-req
    title: Backward-dataflow allocation validator (Rideau/Leroy-style), then mechanize it
    description: >
      Evolve verify_allocation + the per-segment edge-recheck into a single
      backward-dataflow translation validator over (original, rewritten)
      segment pairs — the Rideau/Leroy CC'10 architecture (350-line validator,
      900-line Coq soundness proof in CompCert): refine liveness backward,
      checking that every use in the rewritten code reads a location provably
      holding the right value, covering renaming, coalescing, live-range
      splitting, spill/reload, and architectural register constraints in one
      pass. v1 = Rust, unverified but independent and complete for synth's
      transformation class, wired as the re-allocation pass's acceptance
      check and mutation-tested. v2 = Rocq-mechanized soundness (the
      tool-qualification pillar-1 artifact for the allocator, cheaper and
      stronger than proving the Chaitin/Briggs pass itself). Adaptations from
      the paper: synth validates phys-to-phys rewrites (treat input physical
      registers as variables); constant rematerialization is out of the
      validated class initially (decline, don't guess).
    status: proposed
    tags: [codegen, register-allocation, translation-validation, rocq, track-a, release-v0.11.39]
    links:
      - type: derives-from
        target: VCR-001
      - type: refines
        target: VCR-RA-001
      - type: constraint-satisfies
        target: SC-CODE-1
    fields:
      req-type: safety
      priority: must
      verification-criteria: >
        v1 accepts every rewrite the current pass produces on the fixtures AND
        rejects mutation-injected wrong rewrites (>=95% mutant kill on a
        seeded corpus of bad renames/clobbers); wired as the gate the pass
        cannot bypass. v2: soundness theorem (validator-accepts implies
        behavior preserved) Qed against exec_indexed for the straight-line
        fragment. Kill-criterion: if the validator's decline rate on real
        selector output exceeds ~5% of segments, its completeness is too weak
        and the approach is re-evaluated (CompCert tested relative
        completeness empirically; so will synth).
        PROGRESS (criteria 1 + 3): the empirical real-codegen completeness gate
        (realloc_on_repro_fixture_streams_has_zero_validator_rejects) now spans
        the FULL ARM frozen suite — 32 functions / 57 segments across 10
        fixtures (was 3) — with 0 validator-attributable declines (0% << the 5%
        kill-criterion, which is now asserted explicitly, not just the stronger
        0 pin). v2 (Rocq-mechanized soundness) remains the open step.
        V-NEXT (from gale #331): extend the validator to the SPILL-SLOT /
        frame-allocation layer — it currently validates register rewrites in
        straight-line segments only, NOT frame-slot non-aliasing. #331 was a
        param-home vs spill-pool slot collision (`i64_spill_base` aliases the
        #204 `param_slots` when `has_i64 == false`); a "validate slot
        non-aliasing" invariant would have caught it mechanically. Fixed for now
        by an `area_reserved` guard on the call-result park (ladder-recoverable
        Err → retry reserves the area), but the validator does not yet cover this
        class.

  - id: VCR-RA-004
    type: sw-req
    title: Cycle-safe parallel-move resolver for spill/reload insertion
    description: >
      Step-4 spill insertion adds moves that form arbitrary permutations
      (including cycles) at split points. The literature names this the
      correctness-critical sub-piece (CompCert proves its parallel-move
      algorithm separately, Rideau/Serpette/Leroy; regalloc2 needs a scratch
      register, a stackslot-as-scratch fallback, and a last-ditch emergency
      spill). Build the resolver as its own pure, testable component:
      sequentialize a parallel move set with cycle detection, scratch
      selection from dead registers, and a guaranteed-progress fallback;
      property-tested against a reference permutation semantics. The second
      named pitfall — split points landing inside hot loops — is bounded at
      this stage by synth's straight-line segment scope (no interior loops),
      and re-checked when segments widen.
    status: proposed
    tags: [codegen, register-allocation, parallel-move, spilling, track-a, release-v0.11.38]
    links:
      - type: derives-from
        target: VCR-001
      - type: refines
        target: VCR-RA-001
    fields:
      req-type: functional
      priority: must
      verification-criteria: >
        Property test: for random permutations (incl. cycles, swaps,
        self-moves) over 1..9 registers with 0..2 free scratch regs, the
        sequentialized moves produce the permutation's final state; spill
        insertion on a synthetic over-pressure module compiles and runs
        result-identical to wasmtime; no resolver path can emit an
        unbounded-progress sequence.

  - id: VCR-DEC-001
    type: sw-req
    title: "Decision: Chaitin/Briggs colouring over backtracking-bundle allocation — rationale + revisit trigger"
    description: >
      The production fast-compile Wasm allocators are NOT graph colouring:
      regalloc2 (IonMonkey lineage) is a backtracking allocator over precise
      live ranges (bundles, priority-queue assignment, eviction, on-demand
      splitting), LLVM-greedy is the same family, and regalloc3
      (github.com/Amanieu/regalloc3, active 2026) continues that line as
      regalloc2's designed successor. synth deliberately stays on
      Chaitin/Briggs + value-range splitting because (a) an AOT embedded
      compiler's compile-time budget tolerates colouring, (b) the colouring
      decision layer is simpler to translation-validate (VCR-RA-003) and its
      interference convention matches the proof substrate, and (c) the
      regalloc2 transition data shows the win comes from live-range
      SPLITTING + sophistication, which synth gets via value ranges, not from
      the backtracking search per se. REVISIT TRIGGER: if, after VCR-RA-001
      acceptance, gale's on-target benches still show >=10% cycle gap
      attributable to allocation (spill placement / split quality), evaluate
      adopting or porting regalloc3's bundle model behind the same validator
      — the validator (not the allocator) carries the assurance, so the
      algorithm can be swapped without re-doing proofs (the exact decoupling
      Rideau/Leroy name as validation's advantage).
    status: approved
    tags: [codegen, register-allocation, decision, regalloc3, track-a]
    links:
      - type: derives-from
        target: VCR-001
      - type: refines
        target: VCR-RA-001
    fields:
      req-type: constraint
      priority: must
      verification-criteria: >
        The revisit trigger is checked at VCR-RA-001 acceptance (v0.11.40
        gate): an explicit measured statement "allocation-attributable gap
        <10% or regalloc3 evaluation filed" appears in the release notes.

  - id: VCR-DEC-002
    type: sw-req
    title: "Decision: spill-reduction leapfrogs greedy heuristics — optimal-because-tiny + SSA-chordal + proof-carrying facts (gale #209)"
    description: >
      gale's #209 strategic framing (2026-06-14, on G474RE composed-bench data:
      t_lock +82%, handoff +21%, dominated by 21-34% `[sp]` spill density):
      the spill-reduction increment must NOT re-implement LLVM/GCC greedy
      heuristics — those are heuristic ONLY because they must scale to
      million-instruction TUs. synth's hot kernels are tiny (sem 83, mutex 167,
      control_step 113 insns), so the scaling constraint does not apply, which
      unlocks three shortcuts a mature backend cannot retrofit:
      (1) OPTIMAL allocation — PBQP (Scholz-Eckstein) or a small ILP is
      tractable in ms at <200 insns -> provably minimal spills, not greedy
      leftovers; directly attacks the measured `[sp]` density and beats
      LLVM-by-construction on exactly the functions that matter.
      (2) SSA-CHORDAL coloring (Hack 2006) — on SSA the interference graph is
      chordal -> optimal coloring in P-time; LLVM/GCC destruct SSA before
      regalloc so they cannot use this. Aligns with VCR-RA-001's SSA substrate.
      (3) PROOF-CARRYING optimization facts — pipe Verus's value-range /
      no-overflow / alias facts (we own Verus -> wasm -> loom -> synth) into
      synth as optimization inputs (narrower types, elided bounds/overflow
      guards). The lever that makes verified code FASTER than defensive C.
      TENSION with VCR-DEC-001: that decision chose Chaitin/Briggs (heuristic)
      for translation-validation simplicity; #209 argues optimal is tractable
      AND the validator (VCR-RA-003), not the allocator, carries assurance, so
      an optimal core can sit behind the same validator. Resolve at the
      spill-reduction increment: evaluate PBQP/ILP + SSA-chordal against the
      Chaitin/Briggs baseline under VCR-RA-003, pick by measured spill count +
      validation cost. Target: below LLVM-LTO on the tiny hot kernels, not
      merely parity. Pairs with loom#219 (dissolve the seam first, then
      allocate the smaller result optimally).
    status: proposed
    tags: [codegen, register-allocation, decision, optimal, pbqp, ssa-chordal, proof-carrying, gale-209, track-a]
    links:
      - type: derives-from
        target: VCR-001
      - type: refines
        target: VCR-RA-001
      - type: refines
        target: VCR-DEC-001
      - type: traces-to
        target: gale:209
    fields:
      req-type: constraint
      priority: should
      verification-criteria: >
        At the spill-reduction increment, the release notes report: the chosen
        allocation core (optimal PBQP/ILP vs Chaitin/Briggs), the measured spill
        count before/after on the hot kernels (sem/mutex/control_step), and
        gale's G474RE composed-bench delta against the 860/472 baselines (kill-
        criterion: t_lock << 887, handoff < 1661). All frozen fixtures stay
        bit-identical at every step.

  - id: VCR-PERF-001
    type: sw-req
    title: "Silicon-quantified gust hot-path size gap: 3.9× vs LLVM, per-pass attribution (gale #390)"
    description: >
      gale #390 (2026-06-20, synth v0.11.50 / loom v1.1.14, gust mini-RTOS
      dissolve, thumbv7m disassembly): synth's wasm→ARM lowering emits 3.9× the
      code size of native rustc/LLVM on the gust scheduler hot path — gust_poll
      816 B (240 insns) vs 208 B (104), gust_mix 44 B vs 12 B. The input wasm
      from loom is already compact; the gap is almost entirely synth-side
      lowering. This SUPERSEDES gale #209's qualitative "regalloc is the
      universal lever" with hard per-category byte attribution, and is the
      measurement / kill-criterion the VCR-RA program (epic #242) was waiting
      for. Attribution of the 608 B gap (per gale's disassembly):
        - Pass 1 — NO register allocation: every wasm local/operand spilled to a
          stack slot, the `sched` pointer reloaded from [sp,#0x3c] 10×. ~288 B
          (47%). OWNER: VCR-RA-001 + the allocator-wiring substrate (built:
          interference graph, Chaitin/Briggs color_graph, spill-cost ranking,
          allocation verifier — all side-by-side, UNWIRED). #390 is the payoff
          number that justifies wiring. THE HEADLINE.
        - Pass 2 — const linmem offset not folded into the addressing mode;
          scaled-index `ldr.w rD,[rN,rM,lsl#k]` unused; address materialized in
          r12 before every access. ~128 B. OWNER: addressing-mode folding,
          EXTENDS #382 fold_mem_offset (which folded the const-BASE path; the
          reg-base fold + scaled-index is new).
        - Pass 3 — `__stack_pointer` shadow-stack prologue/epilogue emitted even
          when the function touches no linmem below the frame (gust_poll is
          by-pointer, needs no shadow stack). ~64 B. OWNER: VCR-MEM-001 (#383) +
          scry. CONVERGENCE: this is the SAME analysis as #383 at a third
          granularity — scry's analyze().stack_usage.max_stack_bytes proves the
          worst-case depth; Bytes(0) ⇒ the whole prologue/epilogue is provably
          dead and ELIDED (not just the .bss shrunk). Unblocked by the scry
          integration (scry#51, VCR-MEM-001 layer-2).
        - Pass 4 — comparison feeding only a br_if materialized as bool+cmp#0
          instead of branching off flags. ~46 B. OWNER: VCR-SEL-004 (already
          filed, gale #209).
        - Pass 5 — no copy coalescing (identity mov survive); `and #0xffff` not
          peepholed to `uxth`. ~6 B. OWNER: regalloc coalescing + peephole.
        - Pass 6 — unconditional callee-save of r4–r8 in leaf-ish wrappers.
          ~4 B/fn. OWNER: prologue minimization (save only clobbered).
      Passes 1+3 dominate. Estimated 1–3 alone bring gust_poll from 816 B toward
      ~300–350 B (≈1.5–1.7× vs LLVM), within the project's 10–20%-overhead thesis.

      IN-TREE Pass-1 BASELINE (2026-06-21, frozen-safe, `scripts/repro/spill_baseline_measure.sh`):
      gale measured Pass-1 on gust silicon; this reproduces the SAME mechanism on
      synth's own frozen fixtures so the spill waste is regression-tracked in-tree
      (zero codegen change — compiles the fixtures, reads emitted ARM via thumb
      objdump + the existing SYNTH_SHADOW_ALLOC instrumentation). Per fixture:
      `[sp,#]` spill loads/stores vs peak *value*-pressure (the allocator's
      distinct-simultaneously-live-values count):
        - flight_seam_flat: 56 spill ops / 356 insns, peak value-pressure 7 (≤9)
        - flight_seam:      39 spill ops / 300 insns, peak value-pressure 7–8
        - control_step:      6 spill ops / 113 insns, peak value-pressure 8
      FINDING: the spills are SPURIOUS. synth keeps WASM locals frame-resident BY
      MODEL (local.get→ldr [sp]; local.set→str [sp]), NOT from register pressure —
      every live value fits the R0–R8 pool (peak ≤9). The value-based SSA allocator
      (VCR-RA-001, today shadow-only behind SYNTH_SHADOW_ALLOC) promotes them into
      registers and eliminates the traffic. PRECISION on "the substrate is built
      side-by-side, UNWIRED": accurate for the spill-ELIMINATING value allocator
      (`allocate_function` — shadow-logged only). The default-on range-realloc
      (`reallocate_function`, v0.11.36) is a RENAMER — it never adds/removes
      instructions, so it provably cannot capture Pass-1; and `apply_const_cse` is
      flag-gated (SYNTH_CONST_CSE=1, off by default). So Pass-1 is genuinely
      unrealized in default codegen — #390's headline holds.
      FORK RESOLUTION (the const-CSE-vs-spill question): const/remat opportunities
      are 0–2 on these kernels (synth already lowers consts as immediates), while
      spill-elimination is 56/39/6 — the spill axis is where the bytes are, and it
      is INDEPENDENT of the const-remat axis. Confirms the spill-elimination wiring
      (not const-CSE) as the #390 headline lever. DE-RISK NOTE for the wiring step:
      the frozen fixtures DO exhibit Pass-1 (56 ops on flight_seam_flat), so they
      are a valid in-tree target — the byte-changing wiring still gates on a
      deliberate re-freeze + differential + gale on-silicon (never an idle tick).
      CI-GATED ORACLE (2026-06-23, frozen-safe, #242 idle-tick increment):
      promoted the load-bearing claim from the shell script into a CI test
      (`crates/synth-cli/tests/spill_baseline_pressure_390.rs`,
      `pass1_spills_are_spurious_pressure_fits_r0_r8_390`) so the baseline can no
      longer silently drift. It drives the real `synth` binary with
      SYNTH_SHADOW_ALLOC=1 (zero-byte instrumentation — no selector-config
      divergence, no external disassembler) and locks: every measured function on
      the 3 frozen kernels has peak value-pressure ≤ 9 (the R0–R8 pool ⇒ the
      `[sp,#]` spills are spurious), with loud-failure guards (non-empty output +
      exact per-fixture line/peak counts so a log-format change fails rather than
      passes vacuously) and an aggregate ≥1 spurious-spill demonstration (6
      functions / 2 spurious measured). NOT change-detection (the frozen hashes
      already do that) — it locks the INTERPRETATION + is the before-baseline the
      value-based allocator (VCR-RA-001) wiring must beat. Sibling of
      `scry_const_remat_signal.rs` (the const-remat axis); together they CI-gate
      both #390 levers.
      GAP RE-MEASURED on v0.12.0 (gale #428, 2026-06-23): loom v1.1.16 inline+DCE
      (loom#228) merged the gust_mix wrapper → gap 2.81× → 2.63× LLVM, "synth is
      the SOLE remaining factor." gale re-ranks the levers (cmp→select predication
      #1, then immediate folding, then allocator wiring) — detail + the
      `gust_codegen_bench` kill-criterion recorded under VCR-SEL-004. The
      byte-changing wiring of these levers stays the next DEDICATED gated release,
      not an idle tick.
    status: proposed
    tags: [codegen, perf, regalloc, addressing-mode, size, gale-390, measurement, track-a, silicon]
    links:
      - type: derives-from
        target: VCR-001
      - type: traces-to
        target: VCR-RA-001
      - type: traces-to
        target: VCR-MEM-001
      - type: traces-to
        target: VCR-SEL-004
    fields:
      req-type: non-functional
      priority: should
      verification-criteria: >
        Each pass lands behind the frozen-fixture re-freeze (control_step
        0x00210A55, flat+inlined flight_algo 0x07FDF307, divseam) + the
        differential oracle + gale's on-silicon size confirmation — byte-changing
        optimizations on the flight path, never rushed (the #193/#212/#215
        latent-regalloc lesson). Headline kill-criterion: wiring the built
        allocator substrate (pass 1) drops gust_poll spill count to near-zero and
