  - id: VCR-PERF-001
    type: sw-req
    title: "Silicon-quantified gust hot-path size gap: 3.9× vs LLVM, per-pass attribution (gale #390)"
    description: >
      gale #390 (2026-06-20, synth v0.11.50 / loom v1.1.14, gust mini-RTOS
      dissolve, thumbv7m disassembly): synth's wasm→ARM lowering emits 3.9× the
      code size of native rustc/LLVM on the gust scheduler hot path — gust_poll
      816 B (240 insns) vs 208 B (104), gust_mix 44 B vs 12 B. The input wasm
      from loom is already compact; the gap is almost entirely synth-side
      lowering. This SUPERSEDES gale #209's qualitative "regalloc is the
      universal lever" with hard per-category byte attribution, and is the
      measurement / kill-criterion the VCR-RA program (epic #242) was waiting
      for. Attribution of the 608 B gap (per gale's disassembly):
        - Pass 1 — NO register allocation: every wasm local/operand spilled to a
          stack slot, the `sched` pointer reloaded from [sp,#0x3c] 10×. ~288 B
          (47%). OWNER: VCR-RA-001 + the allocator-wiring substrate (built:
          interference graph, Chaitin/Briggs color_graph, spill-cost ranking,
          allocation verifier — all side-by-side, UNWIRED). #390 is the payoff
          number that justifies wiring. THE HEADLINE.
        - Pass 2 — const linmem offset not folded into the addressing mode;
          scaled-index `ldr.w rD,[rN,rM,lsl#k]` unused; address materialized in
          r12 before every access. ~128 B. OWNER: addressing-mode folding,
          EXTENDS #382 fold_mem_offset (which folded the const-BASE path; the
          reg-base fold + scaled-index is new).
        - Pass 3 — `__stack_pointer` shadow-stack prologue/epilogue emitted even
          when the function touches no linmem below the frame (gust_poll is
          by-pointer, needs no shadow stack). ~64 B. OWNER: VCR-MEM-001 (#383) +
          scry. CONVERGENCE: this is the SAME analysis as #383 at a third
          granularity — scry's analyze().stack_usage.max_stack_bytes proves the
          worst-case depth; Bytes(0) ⇒ the whole prologue/epilogue is provably
          dead and ELIDED (not just the .bss shrunk). Unblocked by the scry
          integration (scry#51, VCR-MEM-001 layer-2).
        - Pass 4 — comparison feeding only a br_if materialized as bool+cmp#0
          instead of branching off flags. ~46 B. OWNER: VCR-SEL-004 (already
          filed, gale #209).
        - Pass 5 — no copy coalescing (identity mov survive); `and #0xffff` not
          peepholed to `uxth`. ~6 B. OWNER: regalloc coalescing + peephole.
        - Pass 6 — unconditional callee-save of r4–r8 in leaf-ish wrappers.
          ~4 B/fn. OWNER: prologue minimization (save only clobbered).
      Passes 1+3 dominate. Estimated 1–3 alone bring gust_poll from 816 B toward
      ~300–350 B (≈1.5–1.7× vs LLVM), within the project's 10–20%-overhead thesis.

      IN-TREE Pass-1 BASELINE (2026-06-21, frozen-safe, `scripts/repro/spill_baseline_measure.sh`):
      gale measured Pass-1 on gust silicon; this reproduces the SAME mechanism on
      synth's own frozen fixtures so the spill waste is regression-tracked in-tree
      (zero codegen change — compiles the fixtures, reads emitted ARM via thumb
      objdump + the existing SYNTH_SHADOW_ALLOC instrumentation). Per fixture:
      `[sp,#]` spill loads/stores vs peak *value*-pressure (the allocator's
      distinct-simultaneously-live-values count):
        - flight_seam_flat: 56 spill ops / 356 insns, peak value-pressure 7 (≤9)
        - flight_seam:      39 spill ops / 300 insns, peak value-pressure 7–8
        - control_step:      6 spill ops / 113 insns, peak value-pressure 8
      FINDING: the spills are SPURIOUS. synth keeps WASM locals frame-resident BY
      MODEL (local.get→ldr [sp]; local.set→str [sp]), NOT from register pressure —
      every live value fits the R0–R8 pool (peak ≤9). The value-based SSA allocator
      (VCR-RA-001, today shadow-only behind SYNTH_SHADOW_ALLOC) promotes them into
      registers and eliminates the traffic. PRECISION on "the substrate is built
      side-by-side, UNWIRED": accurate for the spill-ELIMINATING value allocator
      (`allocate_function` — shadow-logged only). The default-on range-realloc
      (`reallocate_function`, v0.11.36) is a RENAMER — it never adds/removes
      instructions, so it provably cannot capture Pass-1; and `apply_const_cse` is
      flag-gated (SYNTH_CONST_CSE=1, off by default). So Pass-1 is genuinely
      unrealized in default codegen — #390's headline holds.
      FORK RESOLUTION (the const-CSE-vs-spill question): const/remat opportunities
      are 0–2 on these kernels (synth already lowers consts as immediates), while
      spill-elimination is 56/39/6 — the spill axis is where the bytes are, and it
      is INDEPENDENT of the const-remat axis. Confirms the spill-elimination wiring
      (not const-CSE) as the #390 headline lever. DE-RISK NOTE for the wiring step:
      the frozen fixtures DO exhibit Pass-1 (56 ops on flight_seam_flat), so they
      are a valid in-tree target — the byte-changing wiring still gates on a
      deliberate re-freeze + differential + gale on-silicon (never an idle tick).
      CI-GATED ORACLE (2026-06-23, frozen-safe, #242 idle-tick increment):
      promoted the load-bearing claim from the shell script into a CI test
      (`crates/synth-cli/tests/spill_baseline_pressure_390.rs`,
      `pass1_spills_are_spurious_pressure_fits_r0_r8_390`) so the baseline can no
      longer silently drift. It drives the real `synth` binary with
      SYNTH_SHADOW_ALLOC=1 (zero-byte instrumentation — no selector-config
      divergence, no external disassembler) and locks: every measured function on
      the 3 frozen kernels has peak value-pressure ≤ 9 (the R0–R8 pool ⇒ the
      `[sp,#]` spills are spurious), with loud-failure guards (non-empty output +
      exact per-fixture line/peak counts so a log-format change fails rather than
      passes vacuously) and an aggregate ≥1 spurious-spill demonstration (6
      functions / 2 spurious measured). NOT change-detection (the frozen hashes
      already do that) — it locks the INTERPRETATION + is the before-baseline the
      value-based allocator (VCR-RA-001) wiring must beat. Sibling of
      `scry_const_remat_signal.rs` (the const-remat axis); together they CI-gate
      both #390 levers.
      GAP RE-MEASURED on v0.12.0 (gale #428, 2026-06-23): loom v1.1.16 inline+DCE
      (loom#228) merged the gust_mix wrapper → gap 2.81× → 2.63× LLVM, "synth is
      the SOLE remaining factor." gale re-ranks the levers (cmp→select predication
      #1, then immediate folding, then allocator wiring) — detail + the
      `gust_codegen_bench` kill-criterion recorded under VCR-SEL-004. The
      byte-changing wiring of these levers stays the next DEDICATED gated release,
      not an idle tick.
    status: proposed
    tags: [codegen, perf, regalloc, addressing-mode, size, gale-390, measurement, track-a, silicon]
    links:
