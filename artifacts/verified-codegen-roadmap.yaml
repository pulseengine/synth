  - id: VCR-DBG-001
    type: sw-req
    title: "Emit DWARF in the ARM/RISC-V ELF — synth drops debug info (synth #394)"
    description: >
      synth #394: synth lowers WASM → bare-metal ELF but emits ZERO DWARF
      (confirmed: no `.debug_*` in any output), so a synth-compiled image is not
      source-debuggable (no source line at a PC, no variable locations, no named
      backtraces). The input carries it and the upstream preserves it: real
      Rust/clang→wasm modules ship DWARF in custom sections (e.g.
      msgq_put_359.wasm: `.debug_*` across 8 custom sections), and MELD already
      REMAPS that wasm DWARF through fusion (meld-core/src/dwarf.rs +
      dwarf_remap_witness/dwarf_passthrough tests). synth is the ONLY stage that
      drops it — like meld adjusts wasm-DWARF through its transform, synth must
      EMIT ARM/RISC-V-ELF DWARF through its WASM→machine lowering.
      TRACTABLE — synth already has the spine: every ArmInstruction carries
      `source_line` (the wasm op index, ~220 threading sites) = the
      (machine-addr → wasm-offset) half; compose with the wasm DWARF
      (wasm-offset → source) for (machine-addr → source).
      TWO TIERS:
        - Tier 1 `.debug_line` (near-term, raw material ready): machine-addr →
          source line ⇒ breakpoints/single-step land on source, file:line
          backtraces. Independent of regalloc.
        - Tier 2 `.debug_info` variable locations (DWARF location lists):
          source var → ARM reg/stack-slot range. Needs the value→physical-location
          mapping the register allocator produces — the SAME (pc, local) →
          ARM-vreg mapping surfaced in VCR-RA-010 — so it is GATED on the VCR-RA
          allocator wiring.
      DWARF is additive non-loadable sections ⇒ `.text` and the frozen fixtures
      stay bit-identical. Coordinate the line/var encodings with meld so
      source → meld → synth → on-target debugger composes end-to-end.

      FEATURE-LOOP PLAN — Tier 1, release v0.12.0 (the FIRST North-Star FEATURE
      release; user-selected 2026-06-20). Chosen first because additive
      non-loadable sections ⇒ ZERO flight-path risk (no re-freeze, no silicon
      gate) while delivering real integrator value + exercising the
      source-to-object provenance spine. DE-RISKED (spike 2026-06-20): the core
      crux is that synth's `source_line` is the wasm OP INDEX
      (instruction_selector.rs:5428 `wasm_ops.iter().enumerate()`), NOT the wasm
      code BYTE-OFFSET that DWARF .debug_line keys on; and the decoder
      (wasm_decoder.rs decode_function_body:445) DISCARDS the byte offsets
      wasmparser exposes. So the bridge is wasm-op-index → wasm-byte-offset.
      Steps, each oracle-gated:
        (1) DECODER byte-offset side-table: capture per-op wasm code byte offset
            in decode_function_body (wasmparser OperatorsReaderWithOffsets) →
            additive `op_offsets: Vec<u32>` on FunctionOps. Codegen IGNORES it ⇒
            .text byte-identical ⇒ frozen fixtures bit-identical (the first,
            safe, enabling step).
        (2) READ the input wasm DWARF: extract `.debug_*` custom sections
            (wasmparser, already a dep) + parse `.debug_line` (gimli, NEW
            production dep ⇒ deliberate MODULE.bazel pin + repin — in-scope for a
            feature loop) → (wasm-byte-offset → file:line) rows.
        (3) COMPOSE: ARM-text-offset → wasm-op-index (source_line) → wasm-byte-offset
            (step 1) → file:line (step 2). Build the address→line table.
        (4) EMIT the ARM/RV32 `.debug_line` (+ minimal `.debug_info`/`.debug_abbrev`/
            `.debug_str`) as non-ALLOC ELF sections; ensure they survive the
            relocatable host-link path.
        (5) ORACLE: parse the output ELF's `.debug_line`, assert a known
            ARM address resolves to the correct source line; AND assert `.text`
            byte-identical to the no-DWARF build (the load-bearing safety
            property). Then cut v0.12.0.
      PROGRESS:
        - step (1) MERGED #399 (decoder `op_offsets` byte-offset side-table).
        - step (2) READ side proven in-tree 2026-06-21 (frozen-safe spike,
          crates/synth-core/tests/dwarf_line_read_spike.rs): gimli DEV-dep
          extracts the `.debug_*` custom sections (wasmparser) and parses
          `.debug_line` into (wasm-byte-offset → file:line) rows on the
          DWARF-carrying fixture k_mutex_unlock.dissolved.wasm — e.g.
          wasm+0x0094 → panicking.rs:80. DEV-dep ⇒ no production gimli dep, no
          MODULE.bazel pin (Bazel globs src/ only), zero codegen change, frozen
          fixtures bit-identical. The PRODUCTION gimli dep + MODULE.bazel pin
          land with the EMITTER (step 4), as a feature-loop release step — not
          an idle-tick increment.
        - step (3) compose — DE-RISK FINDING 2026-06-21 (offset-space probe,
          since removed): the two address spaces DO NOT trivially align, and
          step 3 must reconcile them BEFORE any join is correct (a guessed join
          yields silently-wrong source lines — worse than none for a debugger).
          Measured on k_mutex_unlock.dissolved.wasm: synth's `op_offsets` are
          MODULE-relative (fn0 0x137..0x13a, fn1 0x140..0x1bd, fn2 0x1c0..0x1c5,
          fn3 0x1cb..0x288; code section at module 0x86), but the `.debug_line`
          row addresses are 0x03 / 0x94 / 0x98 — far below ANY op_offset and not
          reconcilable by the constant code-section base. Two compounding causes:
          (a) DWARF-for-wasm addresses use a CODE-section-relative convention,
          not module-relative — op_offsets need normalizing into it (subtract the
          code-section content base, per-function body-offset aware); and
          (b) this FIXTURE is meld-DISSOLVED and its `.debug_*` describe Rust
          std/core glue (panicking.rs/int_macros.rs/macros.rs/traits.rs) against
          what looks like the PRE-fusion layout — i.e. incoherent with the bytes
          synth compiles. CONCLUSION: step 3 needs (i) the exact DWARF-for-wasm
          address convention pinned + an op_offsets→DWARF-address normalizer, and
          (ii) a COHERENCE-CHECKED fixture — ideally a direct rustc→wasm
          (non-dissolved) module whose `.debug_line` describes its own code — or
          a meld-remapped dissolved module verified coherent. Until then the join
          is unbounded for an idle tick. Acquire/build a coherent-DWARF fixture
          as the first sub-step of the dedicated step-3 work.
        - step (3) FIXTURE-ACQUISITION FINDING 2026-06-22: the obvious paths to a
          small committable coherent-DWARF fixture are BOTH dead ends with the
          local toolchains. (a) `rustc --target wasm32-unknown-unknown -C
          debuginfo={1,2}` on a 2-function no_std cdylib produces COHERENT DWARF
          (.debug_str carries axpy/clampi + the source path — the line table
          describes its OWN code, unlike the dissolved fixtures), and synth
          decodes it cleanly (6 funcs, op_offsets present, NO loud-skip — so the
          synth-DECODE side of step 3 is validated on coherent input). BUT it is
          ~550 KB: rustc emits line tables + .debug_str/.debug_info for the WHOLE
          cdylib's std/core machinery (.debug_line alone 129 KB), not just the 2
          functions — uncommittable next to the repo's <6 KB fixtures, and
          stripping non-line sections doesn't shrink the 129 KB line table.
          (b) Apple `/usr/bin/clang` has NO wasm32 target ("No available targets
          compatible with triple wasm32"). CONCLUSION: a clean step-3 fixture
          needs one of — a wasi-sdk clang+wasm-ld (not installed), a hand-crafted
          minimal `.debug_line` over a tiny hand-written wasm, or a wasm-tools
          pass that extracts just the 2 functions' line-program subset. The
          address-normalizer can be validated against the big /tmp rustc fixture
          in a scratch test before committing anything. Fixture acquisition (not
          the compose logic) is the gating sub-step.
        - step (3) FIXTURE ACQUIRED 2026-06-22 (RESOLVED the blocker): the
          shrink IS achievable — `-C panic=abort -C overflow-checks=off
          -C opt-level=1` with wrapping ops drops the panic/overflow/std-fmt
          machinery that bloated the linked DWARF, yielding a 1.4 KB module with
          a 249-byte `.debug_line` describing only axpy/clampi.
          scripts/repro/dwarf_coherent.{wasm,rs,README} committed + locked by
          crates/synth-core/tests/dwarf_coherent_fixture.rs, which asserts: synth
          decodes it with parallel op_offsets (step 1), the `.debug_line` is
          coherent (names dwarf_coherent.rs, not std glue), and the DWARF
          addresses are CODE-section-relative (≤ code_size, confirmed 0x03..0x21
          for a 33-byte code section) — i.e. the op_offset→DWARF normalization is
          a single code-base subtraction. So step 3 (compose) is now UNBLOCKED:
          the remaining work is the join itself (ARM-text-offset → op-index via
          source_line → op_offset → minus code-base → DWARF row → file:line),
          frozen-safe as an analysis until step 4 emits.
        - step (3) COMPOSE LANDED 2026-06-22: the wasm half of the join —
          op-index → source line — is `synth_core::dwarf_line::op_offsets_to_source`
          (pure, plain-data, no gimli/backend; unwired ⇒ frozen-safe). It
          normalizes each op's MODULE-relative `op_offsets` byte into the
          CODE-relative DWARF space (`op_offset - code_base`, code_base = the code
          section payload start) and takes the covering line-table row.
          EMPIRICALLY confirmed on dwarf_coherent.wasm: code_base = 0x70 (112),
          and op_offset - 112 reproduces the DWARF addresses exactly (axpy op0
          115→0x3, clampi op0 126→0xe). Unit tests (covering-row lookup, before
          first-row, before code-base) + dwarf_compose_step3.rs join the real
          fixture's op_offsets × parsed .debug_line and assert ops resolve to the
          fixture's own source lines (axpy/clampi + inlined-intrinsic lines), with
          the entry-op→entry-row normalization check. REMAINING for step 3→4: the
          ARM-text-offset → op-index half is just `ArmInstruction.source_line`
          (trivial once the backend stream is available); step 4 emits the
          composed table as non-ALLOC `.debug_line` (the byte-touching-but-DWARF-
          additive step, .text still bit-identical).
        - step (4) EMIT-LOGIC DE-RISKED 2026-06-22 (frozen-safe spike): the
          read→compose→EMIT→read loop closes faithfully. dwarf_emit_roundtrip_step4.rs
          composes synth's op-index→line table on dwarf_coherent.wasm, emits it as
          a full minimal DWARF via gimli::write (DEV-dep, default `write` feature
          on), reads it back via gimli::read, and asserts every address resolves
          to the same source line — i.e. synth's composed mapping survives emission
          as debugger-readable DWARF. Test-only ⇒ zero production change, no output
          ELF, frozen fixtures untouched. So the emit FORMAT is proven; the GATED
          remainder of step 4 is: gimli as a PRODUCTION dep (+ MODULE.bazel pin),
          wiring the section into the ELF builder with real ARM text offsets
          (ArmInstruction.source_line → op-index → op_offset−code_base → line),
          and host-link survival — the deliberate v0.12.0 release step (step 5
          oracle then asserts .text byte-identical to the no-DWARF build). NOT an
          idle-tick increment.
        - step (5a) MACHINE-OFFSET CAPTURE landed (PR A, v0.12.0 in progress):
          the encoder gap is closed — `compile_wasm_to_arm` now captures a
          `LineMap = Vec<(machine_offset, wasm_op_index)>` (synth-core backend.rs)
          during the encode loop (`code.len()` immediately before each `encode()`;
          the trailing literal pool and in-place LDR patch don't shift earlier
          offsets), carried on `CompiledFunction.line_map`. Purely additive: the
          map is never serialized, so `.text` is byte-identical (the existing
          differential fixtures + `test_line_map_is_wellformed_dbg001` assert
          monotonic in-bounds offsets and deterministic, unperturbed code). ARM
          only; RISC-V carries an empty map (follow-up).
        - step (5b) EMIT landed (PR B #429, a89ef28, v0.12.0 in progress):
          gimli is now a PRODUCTION dep of synth-core (Cargo.toml + the
          hand-written `crates/BUILD.bazel` synth-core `deps` — from_cargo makes
          `@crates//:gimli` available but the manual rust_library must list it;
          cargo passed locally while Bazel reddened E0433 until fix 63c510f).
          `--debug-line` (clap flag, EXPERIMENTAL caveat) gates emission: when set
          AND the input wasm carries `.debug_line`, synth reads the input rows
          (`read_input_dwarf_line`), composes addr→source via the captured
          `line_map`, and emits a FULL DWARF unit (DW_TAG_compile_unit with
          DW_AT_stmt_list → `.debug_line`, so a normal `dwarf.units()` walk reads
          it — not just a bare `DebugLine` program). Three oracles
          (dwarf_debug_line_emit_394.rs): additive-on-dwarf-input (byte-compares
          .text/.data/.bss, asserts `.debug_*` flag-gated), no-op-on-nodwarf-input
          (whole-.o identical), and resolves-arm-addr-to-source (walks the normal
          unit path, 110 in-range rows → non-zero lines). Frozen fixtures
          untouched. KNOWN GAP closed by step 5c: emitted `.debug_*` addresses are
          `.text`-base-0 with NO relocations, so they are CORRECT in the object
          but WRONG on a linked image — a `--debug-line` consumer (jess, actively
          Renode/silicon-debugging gust, the plausible first consumer) would get
          silently-wrong source lines after host-link. The v0.12.0 TAG is HELD for
          step 5c (advisor-confirmed: PR B in main is default-off + frozen-safe, so
          it banks the work at zero risk; the tag waits for relocations).
        - step (5c) RELOCATIONS LANDED (PR C #430, merged 9a34c8d; SHIPS in
          v0.12.0): C1 generalized elf_builder's `.rel.text`-ONLY machinery to
          PER-SECTION REL tables (`extra_relocations` + `add_section_relocations`;
          `.rel.debug_*`, REL in-place addend); byte-identical when off — the
          frozen gust whole-`.o` no-op oracle is the end-to-end proof, and
          cabi_arena_realloc_linkability_418 `.rel.text` stays byte-identical.
          C2: a custom gimli `write::Writer` (`RelocWriter`) overrides ONLY
          `write_address`, so just the two `.text` references (line program
          `DW_LNE_set_address` + CU `DW_AT_low_pc`) become `R_ARM_ABS32` against a
          global `__synth_text_base` (st_shndx=.text, value 0); internal DWARF
          cross-refs stay concrete (do NOT use gimli's blanket `RelocateWriter`).
          Addend 0 ⇒ `.debug_*` bytes byte-identical to PR B. Oracle
          `rel_debug_relocations_shift_addresses_to_correct_line_394` applies the
          reloc at a NONZERO base and asserts every row shifts by exactly the base
          with its source line preserved; CONFIRMED end-to-end with a real
          `arm-none-eabi-ld -Ttext=0x08000000` link (readelf decodedline → correct
          lines). FAST-FOLLOW: `__synth_text_base` is global ⇒ linking >1
          `--debug-line` object collides (fails LOUD); local-STT_SECTION fix is
          blocked by the hardcoded `.symtab` sh_info=1 — jumps priority iff a
          consumer links multiple synth objects. GOTCHA recorded: dependabot #436
          (gimli 0.31→0.33, `LineProgram::new` 5→6 args) broke main after PR C
          merged textually-clean on a stale base; fixed in #439.
