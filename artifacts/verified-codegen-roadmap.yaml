      carried value on every dispatched/taken arm (`pick(1)`→2 vs 12, `pick_brif(1)`
      →0 vs 10) while the branchless `ctrl` stays correct — isolating the defect to
      the branch value-carry, not result-typed blocks in general. A richer fact than
      the issue stated: the DEFAULT (optimized) path handles `br_if` value-carry but
      still drops `br_table` value-carry, so the bug is not uniform across paths. The
      script is a stable characterization (exit 0 = bug-as-documented); the gated
      block-arity fix flips `EXPECT_MISCOMPILE`→False and it becomes the correctness
      gate. Also corrected a STALE over-claim: `br_table_507_differential.py`'s
      header advertised a "value-returning" shape its `FIXTURES` never contained
      (only the two void-dispatch shapes) — now points at the #509 oracle for the
      carried-value case. Still byte-changing / background — its own gated step.
      #518 ORACLE-FIRST (2026-06-27, third arc member, NOT yet fixed): an i64
      binop reading an i64 PARAM silently miscompiles on BOTH selectors — the same
      `func_58`-class i64-pair-register wall the #503 falcon correction named, now
      isolated to a minimal fixture and quantified ahead of the gated fix. The
      defect is ONE omission with two surface forms: an i64 PARAM is never
      classified as i64. (a) DIRECT/`--relocatable` (`select_with_stack`):
      `infer_i64_locals` learns width only from `LocalSet`/`LocalTee` of an i64
      producer, so a param that is only READ keeps `is_i64=false` → `local.get`
      pushes `StackVal::Reg{is_i64:false}` → its implicit hi (`i64_pair_hi(R0)=R1`)
      is unreserved on the vstack → the following `i64.const` allocates INTO R1 →
      `i64.add` reads the clobbered `a_hi`. Low half correct, high half returns the
      const's low word (`t_add(7)` → `0x5_0000_000C`). (b) OPTIMIZED (`ir_to_arm`):
      the `I64Load` param-home guard (`num_params >= 2`/`>= 4`) confuses a REGISTER
      count with a PARAM count — `(param i64)` has num_params==1, falls through to a
      fresh callee-saved pair (R4:R5) never homed from R0:R1, dropping the param
      (`t_add(7)` → 5, the bare const). Characterization oracle landed THIS tick
      (frozen-safe, no codegen touched): `scripts/repro/i64_param_518.wat` +
      `i64_param_518_differential.py` — AAPCS-correct arg placement (even-aligned
      i64 pairs: `(i32,i64)` → R0,R2:R3), i64-aware result readback (R0|R1<<32),
      runs BOTH paths vs wasmtime. Measured: 10/10 i64-param functions diverge on
      each path; the i32 control (`t_i32`) stays correct on both. The fixture
      covers the FULL AAPCS i64-param register-assignment matrix the fix's mapping
      logic must get right — not just the single leading `(i64)` (R0:R1) case but
      the multi-param shapes the sequential `index_to_reg(i)` mapping botches:
      `(i64,i64)` (p1 = even-aligned R2:R3, mis-mapped to R1 → computes p0.lo+p0.hi
      instead of p0+p1), `(i64,i32)` (p1=R2 ignored), and reading ONLY the second
      i64 param (sequential reads R1, and the const clobbers the real p1.lo=R2). The script is a
      stable characterization (exit 0 = "bug reproduces as the root cause
      documents"); the gated fix flips its `EXPECT_MISCOMPILE→False` and it becomes
      the correctness gate. BOUNDED FIX SPEC for the gated step (NOT this tick):
      direct path — seed `i64_locals` from `self.params_i64` and replace the
      sequential `index_to_reg(i)` param mapping with AAPCS-correct even-aligned
      pair assignment; optimized path — DECLINE i64-param functions to the direct
      selector (the #359/#188/#507 honest-degradation pattern, since `ir_to_arm`
      lacks the param TYPES needed to compute AAPCS pairing). DECLINE LOUDLY at the
      #503-i64 boundary (an i64 param past R3 → stack-passed → still open). Functions
      with no i64 param are byte-identical by construction (the frozen anchors carry
      no i64 params), so the fix is frozen-safe on flip. Byte-changing, silicon-
      gated — its own gated session, never an idle tick.
      CROSS-BACKEND CONTRAST (2026-06-27, measured): the SAME root cause is SILENT
      on ARM but LOUD-SKIPPED on RISC-V. The RV32 selector validates the operand-
      stack TYPE before lowering an i64 op, so an i64 param reaching `I64Add` as an
      i32 operand trips `stack type mismatch ... expected i64, found i32` → typed
      `Err` → `warning: skipping function …` + absent symbol (the #378/#180/#185
      never-guess Ok-or-Err contract as the honest-fail backstop ARM's
      `select_with_stack` LACKS for i64 params). So on this class RV32 is INCOMPLETE
      (cannot yet compile i64-param functions) but SOUND (no silent wrong-code),
      while ARM is COMPLETE-but-UNSOUND until the gated fix — the precise
      VCR-SEL-005 parity shape (ARM lowers X; RV32 loud-declines X). Pinned by
      `scripts/repro/i64_param_518_riscv_loudskip.py` (all 7 i64-param fns
      loud-skipped, i32 control emitted): a regression removing the RV32 stack-type
      guard would flip a loud-skip into a silent miscompile, which the oracle
      catches.
