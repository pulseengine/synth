  # ---------------------------------------------------------------------------
  # gale-proposed (issue #290, 2026-06-10): scry consumption at two trust levels
  # ---------------------------------------------------------------------------

  - id: VCR-RA-010
    type: sw-req
    title: "scry → synth: sound AI annotations as untrusted regalloc oracle + soundness-bearing narrowing pass"
    description: >
      synth consumes scry's sound over-approximation (range / known-bits /
      reachability lattices over fused Core-Model modules emitted by meld) at
      two distinct trust levels, kept architecturally separate so scry's
      soundness is load-bearing in exactly one of them.
      (A) UNTRUSTED ORACLE — regalloc quality: annotations feed
      rematerialization candidate selection, spill-cost pricing (MOV /
      MOVW+MOVT / literal-pool costs from the known constant), coalescing,
      split placement, and liveness pruning via constant-condition dead-edge
      elimination. HINTS only: VCR-RA-003 re-derives liveness/interference
      and validates the assignment, so nothing scry asserts enters the TCB —
      a wrong annotation degrades quality, never correctness.
      (B) SOUNDNESS-BEARING — narrowing rewrite BEFORE regalloc: where scry
      proves an i64's observable range fits 32 bits, synth carries it in one
      GP register and synthesizes the high half on demand, halving pressure
      for that value on 32-bit Cortex. Each narrowing carries its own
      discharged refinement obligation in the Rocq substrate; no narrowing
      fires without it — the assurance surface is one localized refinement
      check, not the interpreter-in-TCB (Verasco-style).
      Relationship to VCR-DEC-001: path (A) is a candidate to close part of
      the VCR-RA-001 revisit-trigger cycle gap WITHOUT porting regalloc3's
      bundle model (the regalloc2 win came from split/remat sophistication,
      which scry sharpens directly). Depends on a scry-side annotation schema
      + soundness statement (SCRY-001, being filed in the scry repo per scry#51,
      2026-06-20; linked here as text until it has an ID). UPDATE (scry#51): scry
      is at v1.11, NOT the stale v0.2 framing — the sound call graph incl.
      call_indirect target sets (FEAT-006), recursion/SCC flag (FEAT-007), and
      the longest-weighted-path stack bound (FEAT-021) ALL shipped, consumable as
      the crates.io crate `scry-sai-core` (`use scry_analyze_core::analyze`).
      First synth consumer is VCR-MEM-001 (gale #383), spike-confirmed on a real
      module (max_stack_bytes = Bytes(32)).

      API-FITNESS CHECK (2026-06-20, spike on real kernels, the v1.12
      `AnalysisResult.invariants` InvariantBundle): the existing API IS
      sufficient for both paths — NO scry change needed for the interval uses.
      `InvariantBundle.points[].locals[]` gives per-`(func, pc, local_index)`
      `AbstractValue::{I32Interval,I64Interval}(Interval{lo,hi})`: a SINGLETON
      interval = known constant (path-A remat candidate); an `I64Interval` that
      fits 32 bits = path-B narrowing candidate. Per-LOCAL granularity is the
      RIGHT granularity — locals are the long-lived pressure (the #390 "sched
      reloaded 10×" is a local). MEASURED known-constant locals: flight_seam_flat
      44/70, control_step 6/24, controller_step 6/20 — exactly the
      const-materialization waste gale measured (#390 pass-5 / #209). Path-B
      (i64-narrowing) found 0 candidates on these i32-dominated kernels (real in
      principle, not exercised here). TWO honest caveats: (1) precision is
      OPPORTUNISTIC — msgq/filter_axis came back all-`top` (values flow from
      memory/params with no constraining context), so scry-remat is a win on
      constant-heavy kernels and SILENT elsewhere — fine for an untrusted oracle
      (no signal ⇒ no hint ⇒ fall back to synth's own analysis, never wrong).
      (2) The real integration cost is SYNTH-side, not a scry gap: scry keys by
      WASM `(func,pc,local)`, synth's regalloc runs on post-selection ARM vregs;
      consuming the signal needs a `(pc,local) → ARM-vreg` mapping
      (`ArmInstruction.source_line` gives the thread — validate with a spike
      before wiring, like the shadow-stack one). Forward-looking observations
      that don't block synth filed to scry as a help-them-improve issue
      (operand-stack abstract values not surfaced; interprocedural range
      propagation via the call graph to sharpen param/memory-derived locals;
      an eventual known-bits domain for alignment/strength-reduction). NOTE the
      CORE regalloc (#390 pass-1 liveness/interference/colouring/spill) does NOT
      need scry — synth's substrate computes it; scry is an opportunistic quality
      oracle on top, never in the TCB.
    status: proposed
    tags: [codegen, register-allocation, scry, abstract-interpretation, do-333, track-a]
    links:
      - type: derives-from
        target: VCR-001
      - type: refines
        target: VCR-RA-001
      # scry SCRY-001 soundness contract (scry REQ-011, tagged scry-001): the
      # over-approximation facts (resolved-targets, recursive) this consumes are
      # HINTS — VCR-RA-003 re-validates — but the narrowing path (B) rests on it.
      - type: traces-to
        target: scry:REQ-011
    fields:
      req-type: functional
      priority: should
      verification-criteria: >
        (A) Annotation-fuzzing: under arbitrary/corrupted scry annotations,
        VCR-RA-003 still accepts and observable behaviour is identical to the
        no-annotation build — only cycle counts move (evidence path A is
        outside the TCB). (B) CI fails on any narrowing rewrite without a
        discharged refinement obligation. (C) At VCR-RA-001 acceptance
        (v0.11.40 gate) the release notes report the measured cycle-gap delta
        attributable to scry-driven remat + narrowing, feeding VCR-DEC-001's
        revisit decision.

  - id: VCR-MEM-001
    type: sw-req
    title: "Bounded + provable native-pointer linear-memory footprint (shadow-stack budget → scry stack-depth AI) — gale #383"
    description: >
      gale #383: under --native-pointer-abi, build_relocatable_elf
      (synth-cli/src/main.rs:2475) sizes the wasm linmem region to
      used_extent = max(data_end, sp_top, global_top, static_top,
      static_top_abs32).min(linear_memory_bytes). The sp_top term is sp_init —
      the shadow-stack top, which wasm-ld sets to the DECLARED page top (65536
      for `(memory 1)`). So the region spans [0, 65536) even when actual data +
      live stack is a few KB, and an 8 KiB-RAM target (STM32F100) cannot place
      it. MEASURED 2026-06-20 (synthetic repro, no gale binary needed —
      reproduced like #354/#382): a `(memory 1)` module with sp_init=65536
      emits a 64 KiB NOBITS .bss (all-zero linmem) or a 64 KiB PROGBITS .data
      (with an init segment below the static region). Root cause is purely
      structural — sp_top dominates used_extent.

      DO NOT fix as a bare CLI cap (integrator declares a number, synth shrinks
      the reservation blindly): shrinking below the live shadow-stack depth
      silently overflows the stack into static data. The integrator declaring a
      RAM budget is the INPUT; the obligation is to keep the footprint claim
      HONEST about what is proven vs asserted. CRITICAL DISCOVERY (2026-06-20):
      synth has ZERO shadow-stack tracking today — the comment at main.rs:2522
      ("the shadow stack is reached only via the SP register value, dynamic,
      never a static reloc") confirms it treats [0, sp_init) as opaque. So the
      shadow stack is a wasm-level construct (the __stack_pointer global's
      decrement idiom), NOT the ARM machine-stack frame_size. Computing its
      depth is a NEW abstract interpretation — which is scry's mandate. Layered
      by risk (advisor-reviewed) so the unblock does NOT depend on the new AI:

        (1) LOAD-BEARING — layout re-base + integrator budget + consistency
            check + honest refuse (THIS issue's fix). New
            `--shadow-stack-size <bytes>` on `compile`: re-base sp_init to a
            budget B instead of the declared page top. Output is "asserted
            (B), not proven"; DEFAULT unset = full-page = byte-identical
            (frozen-safe). SCOPE CORRECTION (2026-06-20, measured on the REAL
            gust-family module msgq_put_359.wasm, not just a synthetic repro):
            sp_init doubles as the selector's classification boundary
            (set_native_pointer_stack → wasm_data_base, instruction_selector.rs:1623;
            classify at 6735/6846: addr >= boundary ⇒ static `__synth_wasm_data + C`
            reloc, < ⇒ SP-relative frame). The selector ALREADY RAN with
            boundary=65536, so a pure post-selection re-base is sound ONLY when
            nothing was classified against it (no static reloc). BUT the real
            msgq module carries 10 `__synth_wasm_data` relocs (zero-init
            k_spinlock-class statics ABOVE the shadow stack: .bss=0x10018=65560 =
            stack [0,65536) + zero statics [65536,65560)). So pure-only REFUSES
            on the real module — it would ship green and NOT unblock gale. The
            actual layer-1 is the #354 per-region retarget extended to the
            NOBITS region: shift the high `__synth_wasm_data + C` (C >= boundary)
            relocs DOWN by (sp_init - B) and size the .bss to B + zero-static
            extent, so the stack reservation shrinks while the zero statics
            stay covered. Re-bases the SP global slot init to B. Sound (stack
            grows down from B; statics at [B, B+ext) above it never overlap).
            HONEST REFUSE for unhandled geometries (static C below the stack /
            B > sp_init / non-Abs32 static relocs). This is link-fragile
            native-pointer surgery (the #354 step-2 work it explicitly
            deferred) on the path gale FLIES ⇒ silicon-gated (held for gale
            confirmation, the #368→#359 lesson — do not rush-ship). The one
            open disambiguation posted to gale: does the gust target use the
            --stack-first layout (statics above the stack, as msgq shows) so
            the down-shift is a uniform addend rewrite.
        (2) OPT-IN, NOT LOAD-BEARING — auto-PROOF of the budget. UPDATE
            (2026-06-20, scry#51): synth does NOT hand-roll the shadow-frame
            idiom extraction — scry ALREADY SHIPPED it. scry v1.11.0 (crates.io
            `scry-sai-core`, `use scry_analyze_core::analyze`) returns, on a
            single pre-meld Core module, `AnalysisResult.stack_usage.max_stack_bytes`
            = longest-weighted-path shadow-stack bound (FEAT-021),
            `call_graph: Vec<CallEdge>` with sound `resolved_targets` for
            call_indirect (FEAT-006) + `soundness` tag, and
            `function_summaries[].recursive` (FEAT-007, Tarjan SCC) — the exact
            honest-fail gate. GROUNDED SPIKE on the real msgq_put_359.wasm:
            stack_usage.max_stack_bytes = Bytes(32), 0 recursive, 0 indirect,
            Sound — i.e. scry PROVES the true shadow-stack worst case is 32 bytes
            where synth reserves 65536 (a 2048x over-reservation). So layer-2 is
            "consume scry as a crate dep, use max_stack_bytes (cross-checked
            against synth's own re-derived longest-path per the VCR-RA-010 trust
            model) as the PROVEN budget; Unbounded/Unknown ⇒ fall back to (1)'s
            integrator-asserted budget or honest-refuse". This SUBSUMES the old
            hand-rolled idiom-extraction plan AND the call_indirect-refuse
            limitation — scry's resolved_targets handle the indirect tail that
            (the old) (2) had to refuse (#383 ↔ #275). Synth-side cost: a
            MODULE.bazel crate pin alongside the Cargo dep (synth builds under
            cargo + Bazel).
        (3) was "scry tail" — now FOLDED INTO (2): the indirect/recursive cases
            are not a separate synth track, they are fields on the same
            scry AnalysisResult. SCRY-001 (scry filing it via PR #53) is the
            soundness statement of resolved_targets (⊇ concrete) + recursive
            (⇒ reachable cycle); synth VCR-MEM-001 / VCR-RA-010 `verifies`-link
            it once it has an ID.
      WIRING HOLDS FOR scry v1.12.0 (scry PR #53, MERGEABLE 2026-06-20): it
      finalizes the API synth consumes — adds `AnalysisResult.reachable_from_exports`
      as a DEDICATED call (instead of synth hand-deriving reachability from
      call_graph, the v1.11 interim shape), confirms the integration is the
      crates.io LIBRARY `scry-sai-core` (not the wasm component), and files
      SCRY-001 with a Rocq `reach_superset` proof. So bind layer-2 against v1.12
      in ONE shot (max_stack_bytes + reachable_from_exports + recursive + the
      SCRY-001 verifies-link) rather than wiring the soon-superseded v1.11 shape
      now — the spike already PROVED the capability (Bytes(32) on real msgq), so
      nothing is lost by holding the binding for the final API.
      Build order: (1) the ELF retarget — silicon-gated on gale's --stack-first
      answer; (2) the scry-proven budget — capability confirmed (spike), BINDING
      held for scry v1.12.0 (PR #53) to finalize the API. The two are independent:
      (1) is the mechanics
      (shrink the .bss), (2) is the proof (how big is safe). Stays opt-in until
      silicon-validated (the #345/#354/#359 lesson — gale/jess confirms the image).

      LAYER-1 INPUTS NOW IN HAND (2026-06-21, gale #383): the two preconditions
      that gated the byte-changing ELF retarget are RESOLVED + verified against
      the artifact (scripts/repro/gust_kernel.wasm, from gale #91, in-tree):
        - LAYOUT = stack-first (the direct down-shift case, NOT the refuse
          geometry). Verified: memory[0] = 17 pages declared; __stack_pointer
          init sp_init = 1048576; the lone .rodata segment (143 B) sits AT 1048576
          (__data_end 1048719 / __heap_base 1048720) — statics at/above sp_init,
          NONE below. So every static addend >= sp_init shifts down by a uniform
          (sp_init - B); no static-below-stack refuse case to handle for gust.
        - FIXTURE: synth@main (no flag) reproduces gale's number exactly —
          text 1370 / data 156 / bss 1048720 (~1 MiB over-reservation, all of it
          the [0, sp_init) stack page); --shadow-stack-size errors honestly
          (PR #388 scaffold). B = 4096 -> reserve B + 144 = ~4.2 KB, inside the
          8 KiB STM32F100 part.
        - SCRY-PROVEN DEPTH (measured 2026-06-22, dev-dep): scry proves
          gust_kernel's worst-case shadow-stack depth is Bytes(16) (sp_global=0,
          no recursion, 6 reachable) — so jess's flashed asserted B=4096 clears
          the proven depth with a 256x margin (16 <= 4096): the live silicon-rung
          budget is SOUND, not an under-reservation. layer-2 would auto-derive
          16 B (ProvenStackDepth) — 256x tighter than the asserted 4096 and
          65536x under the 1 MiB declared-page default. Locked by the dev-dep
          test `layer2_gust_kernel_proven_depth_clears_flashed_budget_383`, so a
          future scry bump raising the proven depth above the flashed budget
          reddens CI before silicon, not after.
      So layer-1 is unblocked and its geometry is the clean uniform-down-shift.
      Remaining = the byte-changing retarget itself (re-base sp_init -> B; shift
      every __synth_wasm_data static addend >= sp_init down by (sp_init - B),
      across both MovwAbs pairs and Abs32 literal-pool words; resize the region
      to B + static-extent; keep the refuse-on-collision guard) + the post-link
      oracle (stack/static no-overlap; every relocated access in-reservation, the
      #359 check), behind the opt-in flag so frozen fixtures stay bit-identical.
      gale offered on-silicon reflash on this exact gust_kernel.wasm as the final
      gate. A FOCUSED gated step, not an idle-tick increment.

      LAYER-2 DECISION LOGIC LANDED (2026-06-22, frozen-safe, no dep change):
      `synth-cli/src/shadow_budget.rs` — a pure `budget_from_bound(bound,
      sp_init, fallback) -> BudgetDecision` over a synth-OWNED `StackDepthBound`
      enum (Bytes(u64)|Unbounded|Unknown), so the decision compiles and unit-
      tests (9 cases) WITHOUT scry in the build graph. Primary-source-confirmed
      scope (scry-sai-core-1.12 lib.rs:276-281: max_stack_bytes is "the deepest
      weighted path … each function weighted by the frame its prologue subtracts
      from the __stack_pointer global … guest shadow-stack only") ⇒ Bytes(n)
      yields source=ProvenStackDepth labelled "proven stack DEPTH, asserted
      no-heap" (NOT a bare "proven footprint" — the #383 overclaim shape is
      explicitly guarded against). Refuses when proven depth > sp_init (names it
      as the ORIGINAL image under-provisioning its stack, a latent source bug
      surfaced for free). Unbounded/Unknown ⇒ AssertedFallback or honest-refuse;
      Unknown NEVER yields ProvenStackDepth even with a fallback (unit-tested).
      B is rounded up to 16-byte AAPCS/LLVM stack alignment (rounding up keeps
      B >= proven depth ⇒ soundness preserved). `#[allow(dead_code)]` until the
      gated call site lands.

      TWO GATED STEPS REMAIN, the first a USER DECISION:
        (2a) DEP ARCHITECTURE — promoting scry-sai-core from dev-dep to a
             PRODUCTION dep of synth-cli pulls its full transitive closure into
             the Bazel `rust_binary` compile (synth-cli IS in the Bazel graph:
             crates/BUILD.bazel:230). MODULE.bazel uses `crate.from_specs()`
             (21 manual `crate.spec`s, NOT `from_cargo`) — likely because z3
             needs `features=["static-link-z3"]`. So the cascade is real and the
             fix is one of {from_cargo migration, feature-gate the scry call out
             of the Bazel build, ~28 manual specs}. NOT an idle-tick or a unilateral
             call — taken to the user.
        (2b) ADAPTER + WIRING — `scry_analyze_core::StackBound -> StackDepthBound`
             adapter at a gated call site that runs `analyze()` on the pre-link
             Core module, feeds `budget_from_bound`, and routes the result into
             the layer-1 shrink. Opt-in (e.g. `--shadow-stack-size auto`); default
             unchanged ⇒ frozen fixtures bit-identical. verifies-link scry SCRY-001.
    status: proposed
    tags: [codegen, native-pointer-abi, memory-layout, abstract-interpretation, scry, stack-depth, gale-383, track-a]
