  - id: VER-ZI-001
    type: sys-verification
    title: Zephyr CMake and AAPCS integration verification
    description: >
      The examples/zephyr-poc/ project demonstrates Zephyr CMake build
      integration (ZI-001) and AAPCS calling convention compliance
      (ZI-002). The project includes synth-compiled assembly via
      target_sources and calls synth functions from C using extern
      declarations. Evidence that .syntax unified / .thumb / .global
      directives work with the Zephyr SDK arm-none-eabi-gcc assembler.
    status: implemented
    tags: [zephyr, cmake, aapcs, verification]
    links:
      - type: verifies
        target: ZI-001
      - type: verifies
        target: ZI-002
    fields:
      method: inspection
      evidence:
        - examples/zephyr-poc/CMakeLists.txt
        - examples/zephyr-poc/prj.conf
        - examples/zephyr-poc/src/
      steps:
        run: "Review zephyr-poc project structure and build integration"
        coverage: "CMake integration, AAPCS calling convention, assembly directives"

  - id: VER-ZI-002
    type: sys-verification
    title: Zephyr configuration and linker script verification
    description: >
      Verification of Zephyr prj.conf configuration (ZI-004),
      linker script generation (ZI-008), and Meld runtime integration
