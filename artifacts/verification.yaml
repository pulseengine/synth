      steps:
        run: "cargo clippy --workspace --all-targets -- -D warnings && cargo fmt --check"
        coverage: "All crates, all targets"

  - id: VER-008
    type: sys-verification
    title: Cross-platform CI and Bazel hermetic build
    description: >
      CI builds and tests running on Linux and macOS, combined with Bazel
