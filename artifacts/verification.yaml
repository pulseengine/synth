  # ---------------------------------------------------------------------------
  # Target platform verification (TP-001..TP-008)
  # ---------------------------------------------------------------------------

  - id: VER-TP-001
    type: sys-verification
    title: Cortex-M4F target support verification
    description: >
      Renode emulation tests validate that synth produces correct
      bare-metal ELF binaries for the Cortex-M4F target. The Renode
      platform (synth_cortex_m.repl) emulates Cortex-M4 at 0x0 flash
      / 0x20000000 SRAM. Tests in tests/renode/cortex_m_test.robot
      compile WASM to ARM, load ELF via sysbus LoadELF, and verify
      execution results via register inspection.
    status: implemented
    tags: [target-platforms, cortex-m4, renode, verification]
    links:
      - type: verifies
        target: TP-001
      - type: verifies
        target: TP-008
    fields:
      method: simulation
      evidence:
        - tests/renode/cortex_m_test.robot
        - tests/renode/synth_cortex_m.repl
      steps:
        run: "bazel test //tests/renode:cortex_m_test"
        coverage: "Cortex-M4F ELF boot and execution on Renode emulation"

  - id: VER-TP-002
    type: sys-verification
    title: Board profile and memory layout verification
    description: >
      Unit tests in synth-backend verify correct board profiles for
      STM32F407 (TP-002) and nRF52840 (TP-003). Tests confirm flash
      base addresses (0x08000000 for STM32, 0x00000000 for nRF52840),
      RAM layout, MPU region counts, and FPU capabilities. Also tests
      Cortex-M7 (TP-004) and M33 (TP-005) target specification
      construction and hardware capability reporting.
    status: implemented
    tags: [target-platforms, board-profile, unit-tests, verification]
    links:
      - type: verifies
        target: TP-002
      - type: verifies
        target: TP-003
      - type: verifies
        target: TP-004
      - type: verifies
        target: TP-005
    fields:
      method: automated-test
      steps:
        run: "cargo test -p synth-backend -- hardware_capabilities"
        coverage: "STM32F407, nRF52840, Cortex-M7, Cortex-M33 profiles"

  - id: VER-TP-003
    type: sys-verification
    title: Vector table and startup code verification
    description: >
      Tests verifying vector table generation (TP-006) and MPU region
      allocation (TP-007). Unit tests confirm correct Thumb-mode
      addresses in the vector table, Reset_Handler initializes R11
      to 0x20000000, FPU enable code writes CPACR, and MPU allocator
      produces valid region configurations for power-of-2 sizes with
      correct RBAR/RASR register values.
    status: implemented
    tags: [target-platforms, vector-table, mpu, verification]
    links:
      - type: verifies
        target: TP-006
      - type: verifies
        target: TP-007
    fields:
      method: automated-test
      steps:
        run: "cargo test -p synth-backend -- vector_table mpu"
        coverage: "Vector table layout, startup code, MPU region allocation"

