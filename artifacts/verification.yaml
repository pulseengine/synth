  - id: VER-ZI-004
    type: sys-verification
    title: Bounds checking strategy verification
    description: >
      Unit tests in synth-memory verify bounds checking strategy
      selection for Zephyr targets (ZI-010). Tests confirm
      SoftwareBoundsChecker traps on out-of-bounds, MaskingBoundsChecker
