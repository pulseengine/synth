    type: sw-verification
    title: SSA register-allocator substrate (liveness/interference/colouring/spill)
    description: >
      Verifies the VCR-RA-001 allocator substrate built side-by-side: CFG
      liveness, the interference graph, Chaitin/Briggs colouring (plain,
      precoloured, spill-cost-ranked), value-range allocation, the allocation
      validator, and the reallocation/realloc-stats passes. The substrate is
      the foundation the eventual spill-aware allocator wiring consumes.
    status: implemented
    tags: [register-allocation, vcr-ra, substrate]
    links:
      - type: verifies
        target: VCR-RA-001
    fields:
      method: automated-test
      steps:
        run: "cargo test -p synth-synthesis --lib liveness::"
        coverage: >
          crates/synth-synthesis/src/liveness.rs unit tests (interference_graph,
          color_graph[_precolored[_costed]], range_interference, verify_allocation,
          reallocate_function, allocate_function, function_peak_pressure)

  - id: SWVER-015
    type: sw-verification
    title: scry const-rematerialization signal (VCR-RA-010 path-A substrate)
    description: >
      Verifies that scry's interval domain surfaces the constant-local signal
      the VCR-RA-010 untrusted regalloc oracle consumes — singleton intervals =
      provably-constant locals (rematerialization candidates) — on the hot
      kernels (flight_seam_flat, control_step). DEV-dependency on scry-sai-core;
      no production dep, no codegen change.
    status: implemented
    tags: [register-allocation, scry, vcr-ra, abstract-interpretation]
    links:
      - type: verifies
        target: VCR-RA-010
    fields:
      method: automated-test
      steps:
        run: "cargo test -p synth-cli --test scry_const_remat_signal"
        coverage: >
          crates/synth-cli/tests/scry_const_remat_signal.rs — asserts substantial
          singleton-interval (known-constant) local signal on the hot kernels

  - id: SWVER-016
    type: sw-verification
    title: DWARF Tier-1 source-provenance read→compose→emit logic (steps 1-4, frozen-safe)
    description: >
      Verifies the frozen-safe portion of VCR-DBG-001 — the full read→compose→emit
      LOGIC, all proven in-tree without a production gimli dep or any output-ELF
      change (the gated step-4 ELF wiring + host-link is the v0.12.0 release step,
      verified separately when it lands):
        step 1 — the decoder records the per-op wasm code BYTE OFFSET
                 (op_offsets side-table);
        step 2 — the input wasm's `.debug_line` parses into (wasm-byte-offset →
                 file:line) rows via gimli (DEV-dep);
        step 3 — synth_core::dwarf_line::op_offsets_to_source joins op-index →
                 source line, normalizing module-relative op_offsets into the
                 code-relative DWARF address space (single code-base subtraction);
        step 4 (logic) — synth's composed table emits as a `.debug_line` via
                 gimli::write and reads back faithfully (every address → the same
                 source line).
      A coherence-checked fixture (scripts/repro/dwarf_coherent.wasm) underpins
      steps 2-4 (its `.debug_line` describes its OWN source, unlike the dissolved
      fixtures). The gated EMIT wiring (production gimli dep + ELF builder + real
      ARM offsets) remains open — see the VCR-DBG-001 PROGRESS notes.
    status: implemented
    tags: [dwarf, debuggability, vcr-dbg, steps-1-4-frozen-safe]
    links:
      - type: verifies
        target: VCR-DBG-001
    fields:
      method: automated-test
      steps:
        run: "cargo test -p synth-core dwarf_ dbg001 && cargo test -p synth-core --lib dwarf_line::"
        coverage: >
          wasm_decoder.rs op_offsets test (step 1) + dwarf_line_read_spike.rs
          (step 2) + dwarf_coherent_fixture.rs (coherent fixture) +
          dwarf_compose_step3.rs & dwarf_line:: unit tests (step 3 compose) +
          dwarf_emit_roundtrip_step4.rs (step-4 emit logic round-trip)

  - id: SWVER-017
    type: sw-verification
    title: Cross-backend op-parity oracle (ARM vs RISC-V)
    description: >
      Verifies the VCR-SEL-005 op-parity oracle: the ledger of which WasmOps
      each selector (ARM select_default, RISC-V selector) lowers, asserting the
      tracked parity so a "selector missed an op" regression (the #223/#232
      class) is caught mechanically rather than on silicon. Both selectors fail
      honestly on an unlowered op; this oracle tracks the gap explicitly.
    status: implemented
    tags: [instruction-selection, cross-backend, vcr-sel, op-parity]
    links:
      - type: verifies
        target: VCR-SEL-005
    fields:
      method: automated-test
      steps:
        run: "cargo test -p synth-backend-riscv --test cross_backend_op_parity"
        coverage: >
          crates/synth-backend-riscv/tests/cross_backend_op_parity.rs — the
          ARM/RISC-V op-lowering parity ledger

  # Native-pointer ABI verification cluster (#237/#354/#359/#383): completes the
  # right side of the V for the native-pointer linear-memory family alongside
  # SWVER-013 (VCR-MEM-001 / #383). The #354 split + #359 Abs32 sizing are
  # verified by the same #359 oracles (a unicorn-on-.o oracle could not see the
  # link-time retargeting — #368 — so the post-link oracle builds the real
  # linked image; the differential checks runtime correctness).

  - id: SWVER-018
    type: sw-verification
    title: Per-region .bss/.data split for high-offset init segments (#354)
    description: >
      Verifies GI-NPA-004: under --native-pointer-abi a high-offset initialized
      (data) segment is packed into a small PROGBITS .data under its own
      __synth_wasm_seg_K symbol (not dragged into a fat zero-gap PROGBITS), and
      every __synth_wasm_data + C static reloc landing in segment K is retargeted
      to __synth_wasm_seg_K + (C - seg_off). The post-link oracle builds the
      actual linked image and asserts no __synth_wasm_* literal read lands past
      __bss_end; the differential confirms the retargeted access reads the right
      value at runtime.
    status: implemented
    tags: [native-pointer-abi, memory-layout, gale-354, native-pointer-cluster]
    links:
      - type: verifies
        target: GI-NPA-004
    fields:
      method: automated-test
      steps:
        run: "/tmp/armv/bin/python scripts/repro/postlink_359_oracle.py && /tmp/armv/bin/python scripts/repro/dyn_table_359_differential.py /tmp/dt359.elf"
        coverage: >
          scripts/repro/postlink_359_oracle.py (linked-image #354-split invariant)
          + scripts/repro/dyn_table_359_differential.py (mixed-split runtime)

  - id: SWVER-019
    type: sw-verification
    title: Native-pointer .bss sized for Abs32 static accesses (#359)
    description: >
      Verifies GI-NPA-005: the native-pointer reservation extent covers the
      Abs32 literal-pool static addends (read from the in-place .text word
      pre-retarget), not just MovwAbs ones — so a legitimate high-offset access
      (e.g. an action→ret table read at the tail of the init segment) lands
      in-reservation and reads the right value instead of garbage past __bss_end
      (the #354 × #368 interaction that took the queue-full branch on an empty
      queue).
    status: implemented
    tags: [native-pointer-abi, memory-layout, gale-359, native-pointer-cluster]
    links:
      - type: verifies
        target: GI-NPA-005
    fields:
      method: automated-test
      steps:
        run: "/tmp/armv/bin/python scripts/repro/dyn_table_359_differential.py /tmp/dt359.elf && /tmp/armv/bin/python scripts/repro/postlink_359_oracle.py"
        coverage: >
          scripts/repro/dyn_table_359_differential.py (lookup table read at the
          init-segment tail) + scripts/repro/postlink_359_oracle.py (no literal
          read past __bss_end)

  - id: SWVER-020
    type: sw-verification
    title: WasmCert-Coq refinement of exec_wasm_instr — i32 + i64 fragments (#242)
    description: >
      Verifies VCR-WASM-001: synth's WASM stack-machine executor
      (exec_wasm_instr) is machine-checked to REFINE the WasmCert-Coq
      operational rules for the integer fragment. coq/Synth/WASM/
      WasmCertReference.v transcribes the WasmCert-Coq numerics rules (i32: 19
      ops; i64: 22 ops — add/sub/mul/and/or/xor/shl/shr_u/shr_s/rotl/rotr/eqz/
      eq/ne/lt/gt/le/ge) from the PINNED coq9.0-wasm-2.2.0 sources with
      line-level provenance (numerics.v generic Make functor read at wordsize
      32/64; CompCert 3.16 Integers.v for the underlying ops incl. rol/ror
      217-222). WasmCertBridge.v proves a real-Qed op-level refinement lemma per
      op AND an executor-level lemma routing through the real exec_wasm_instr for
      every WIRED op. HONEST SCOPE (named, not fabricated): (1) it is still a
      hand TRANSCRIPTION of the pinned sources, not the real external dep — that
      stays blocked on the unfree CompCert 3.16 the current nixpkgs pin
      propagates; (2) the 6 i64 arithmetic/bitwise ops have op-level refinement
      ONLY, because exec_wasm_instr returns None for their constructors (unwired
      in the model). The WASM-side analogue of SailArmBridge.v (VCR-ISA-001).
    status: implemented
    tags: [vcr-wasm, wasmcert, rocq, refinement, transcription, epic-242]
    links:
      - type: verifies
        target: VCR-WASM-001
    fields:
      method: formal-proof
      steps:
        run: "bazel test //coq:verify_proofs"
        coverage: >
          coq/Synth/WASM/WasmCertBridge.v (98 Qed: i32 + i64 op-level and
          executor-level refinement lemmas + encoding/bit-level/rotate-boundary
          helpers) against coq/Synth/WASM/WasmCertReference.v; re-derived Qed
          total 585 CI-gated by scripts/claim_check.py (claims.yaml
          wasmcert_bridge_qed flows to artifacts/status.json)
