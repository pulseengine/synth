# SW Verification Artifacts (ASPICE SWE.6)
#
# System: Synth — WebAssembly-to-ARM Cortex-M AOT compiler
#
# Software-level verification measures tracing to technical requirements (sw-req).
#
# Format: rivet generic-yaml

artifacts:
  - id: SWVER-001
    type: sw-verification
    title: WASM/WAT/WIT input parsing tests
    description: >
      Unit and integration tests verifying correct parsing of WebAssembly
      binary (.wasm), text format (.wat), and WIT interface definition
      (.wit) files. Includes tests for malformed input rejection with
      descriptive error messages, Component Model binary validation, and
      target specification file parsing (TOML/YAML).
    status: implemented
    tags: [parsing, input-formats, unit-tests]
    links:
      - type: verifies
        target: TR-001
    fields:
      method: automated-test
      steps:
        run: "cargo test -p synth-cli -p synth-core -p synth-abi"
        coverage: "Input format parsing and validation"

  - id: SWVER-002
    type: sw-verification
    title: ELF output and binary format validation
    description: >
      Tests verifying ELF binary generation, including readelf validation
      of generated files, vector table layout correctness, linker script
      processing, DWARF debug information generation, and Renode boot
      tests confirming binaries execute on Cortex-M4 targets. Also covers
      disassembly output and verification artifact generation.
    status: implemented
    tags: [elf, output-formats, integration-tests]
    links:
      - type: verifies
        target: TR-002
    fields:
      method: automated-test
      steps:
        run: "cargo test -p synth-backend && bazel test //tests/..."
        coverage: "ELF generation, binary formats, Renode boot"

  - id: SWVER-003
    type: sw-verification
    title: Toolchain integration and CLI tests
    description: >
      Tests verifying CLI interface compatibility with standard embedded
      workflows, including synth compile/verify/disasm subcommands, output
      file compatibility with ARM toolchain utilities (objdump, readelf),
      and Bazel build system integration tests that exercise the full
      build pipeline.
    status: implemented
    tags: [toolchain, cli, integration]
    links:
      - type: verifies
        target: TR-003
    fields:
      method: automated-test
      steps:
        run: "cargo test -p synth-cli && bazel build //crates:synth"
        coverage: "CLI interface and toolchain compatibility"

  - id: SWVER-004
    type: sw-verification
    title: Target configuration and synthesis settings tests
    description: >
      Tests verifying target architecture configuration including CPU
      variant selection, FPU capability detection, MPU region mapping,
      memory layout configuration (flash/RAM sizes, stack sizes),
      optimization level settings, and safety mode configuration
      (hardware vs software bounds checking, trap handling strategy).
    status: implemented
    tags: [configuration, targets, settings]
    links:
      - type: verifies
        target: TR-004
    fields:
      method: automated-test
      steps:
        run: "cargo test -p synth-backend -p synth-synthesis -p synth-memory"
        coverage: "Target profiles, MPU config, memory layout"

  - id: SWVER-005
    type: sw-verification
    title: Verification infrastructure integration tests
    description: >
      Tests verifying the verification infrastructure itself: Z3 SMT
      translation validation with bit-vector reasoning and configurable
      timeouts, Rocq proof compilation (188 Qed), and proptest
      property-based testing integration. Ensures all three verification
      backends produce correct results and integrate into the build.
    status: implemented
    tags: [z3, rocq, proptest, verification-infra]
    links:
      - type: verifies
        target: TR-005
    fields:
      method: automated-test
      steps:
        run: "cargo test -p synth-verify && bazel test //coq:verify_proofs"
        coverage: "Z3 SMT suite, Rocq proof compilation, proptest"

  - id: SWVER-006
    type: sw-verification
    title: GlobalGet/GlobalSet instruction selection tests
    description: >
      Unit tests verifying correct instruction selection for WASM global
      variable access (global.get and global.set). R9 is the dedicated
      globals base register. GlobalGet loads from [R9, #index*4] into a
      destination register; GlobalSet stores from a source register to
      [R9, #index*4]. Tests cover both select_default (non-stack) and
      select_with_stack (stack-tracking) code paths, including index
      offset calculation, round-trip get-modify-set, and composition
      with other instructions.
    status: implemented
    tags: [globals, instruction-selection, unit-tests]
    links:
      - type: verifies
        target: TR-001
      - type: verifies
        target: TR-004
    fields:
      method: automated-test
      steps:
        run: "cargo test -p synth-synthesis -- test_global"
        coverage: >
          8 tests: select_default (get index 0, get index 3, set index 0,
          set index 5), stack mode (get, set, get-set roundtrip),
          composition with select

  - id: SWVER-007
    type: sw-verification
    title: Select instruction selection tests
    description: >
      Unit tests verifying correct instruction selection for the WASM
      select instruction. Select pops condition, val2, val1 from the
      stack and pushes val1 if condition != 0, else val2. ARM lowering
      uses CMP + MOV (default) + IT EQ; MOVEQ (conditional override).
      Tests cover both select_default and select_with_stack code paths,
      and composition with GlobalGet/GlobalSet.
    status: implemented
    tags: [select, instruction-selection, unit-tests]
    links:
      - type: verifies
        target: TR-001
    fields:
      method: automated-test
      steps:
        run: "cargo test -p synth-synthesis -- test_select"
        coverage: >
          5 tests: select_default mode, stack mode with constants,
          stack mode already tested in control_flow_select,
          composition with global values

  - id: SWVER-008
    type: sw-verification
    title: Import call stub generation verification
    description: >
      Verifies that import call dispatch stubs are correctly generated,
      including __meld_dispatch_import generic dispatch path and per-import
      direct dispatch with AAPCS argument placement. Tests validate the
      full Meld ABI pipeline from import index resolution through ARM
      instruction emission.
    status: implemented
    tags: [import-dispatch, meld-abi, unit-tests]
    links:
      - type: verifies
        target: KB-TR-001
    fields:
      method: automated-test
      steps:
        run: "cargo test -p synth-backend -- meld_abi"
        coverage: >
          test_import_dispatch_stub_generation() and
          test_full_meld_abi_pipeline() in
          crates/synth-backend/tests/meld_abi_test.rs

  - id: SWVER-009
    type: sw-verification
    title: .meld_import_table section emission verification
    description: >
      Verifies that the ELF builder correctly emits the .meld_import_table
      section with proper import metadata entries, string table offsets,
      and section flags for runtime import resolution by kiln-builtins.
    status: implemented
    tags: [import-table, elf, unit-tests]
    links:
      - type: verifies
        target: KB-TR-003
    fields:
      method: automated-test
      steps:
        run: "cargo test -p synth-cli -- compile_import_call"
        coverage: >
          compile_import_call_produces_relocatable_elf() in
          crates/synth-cli/tests/wast_compile.rs validates
          .meld_import_table presence in emitted ELF

  - id: SWVER-010
    type: sw-verification
    title: LinkerScriptGenerator Meld section support verification
    description: >
      Verifies that the LinkerScriptGenerator correctly emits Meld-specific
      sections (.meld_import_table, .meld_import_strings) in the generated
      linker script with correct memory placement and section flags.
    status: implemented
    tags: [linker-script, meld-sections, unit-tests]
    links:
      - type: verifies
        target: SL-TR-001
    fields:
      method: automated-test
      steps:
        run: "cargo test -p synth-backend -- linker_script"
        coverage: >
          LinkerScriptGenerator unit tests in
          crates/synth-backend/src/linker_script.rs

  - id: SWVER-011
    type: sw-verification
    title: Relocation emission verification
    description: >
      Verifies that the ELF builder emits correct .rel.text relocation
      entries (R_ARM_THM_CALL) for import call sites, enabling the static
      linker to resolve __meld_dispatch_import symbols at link time.
    status: implemented
    tags: [relocations, elf, unit-tests]
    links:
      - type: verifies
        target: SL-TR-003
    fields:
      method: automated-test
      steps:
        run: "cargo test -p synth-cli -- compile_import_call"
        coverage: >
          wast_compile.rs validates .rel.text section presence
          and relocation entries in emitted relocatable ELF

  - id: SWVER-012
    type: sw-verification
    title: Relocatable ELF emission verification
    description: >
      Verifies that synth emits a valid ET_REL relocatable ELF object file
      with correct ARM ELF header fields (EM_ARM, Thumb-2 flags), required
      sections (.text, .symtab, .strtab), and proper symbol visibility for
      exports (GLOBAL) and imports (UND).
    status: implemented
    tags: [elf, relocatable, integration-tests]
    links:
      - type: verifies
        target: CC-008
    fields:
      method: automated-test
      steps:
        run: "cargo test -p synth-cli -- compile_import_call"
        coverage: >
          compile_import_call_produces_relocatable_elf() in
          crates/synth-cli/tests/wast_compile.rs validates
          complete relocatable ELF structure
