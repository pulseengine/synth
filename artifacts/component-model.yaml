  - id: CM-VER-003
    type: sw-verification
    title: Component lowering end-to-end test
    description: >
      End-to-end test verifying that a WASM component, lowered via meld's
      fuser to a core module, compiles through synth to an ARM ELF binary
      that successfully executes with kiln-builtins host intrinsics on a
      Cortex-M4 target (Renode emulation). Validates the full BA RFC #46
      pipeline: component -> meld fuse -> synth compile -> kiln execute.
    status: planned
    tags: [rfc46, end-to-end, integration, cross-toolchain]
    links:
