      preconditions:
        - Meld fuser available
        - Kiln-builtins compiled for ARM target
        - Renode emulator available
      steps:
        run: "bazel test //tests/component-model/... (planned)"
        coverage: "Component -> core lowering -> AOT compile -> execute"
