      lists. These tests exercise the same code paths that synth-compiled
      modules use for component boundary crossings.
    status: implemented
    tags: [canonical-abi, roundtrip, synth-abi]
    links:
      - type: verifies
        target: CM-TR-001
      - type: verifies
        target: CM-TR-002
      - type: verifies
        target: CM-TR-003
      - type: verifies
