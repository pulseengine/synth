# STPA Step 1c: System-Level Constraints
#
# System: Synth — WebAssembly-to-ARM Cortex-M AOT compiler
#
# Each constraint is the inversion of a hazard: it specifies the condition
# that must be enforced to prevent the hazard.
#
# Spec baselines:
#   Core: WebAssembly Specification 3.0 (2025-12-03)
#   ARM: ARM Architecture Reference Manual (ARMv6-M, ARMv7-M, ARMv8-M)
#   ELF: ELF for ARM Architecture (ARM IHI 0044)

system-constraints:
  - id: SC-1
    title: Instruction selection must preserve WASM operation semantics
    description: >
      For every WebAssembly operation, the compiled ARM instruction sequence
      shall produce identical results to the WebAssembly specification for
      all possible input values. This includes arithmetic edge cases
      (overflow, division by zero, INT_MIN/-1), correct signedness
      (signed vs unsigned), correct conversion semantics (truncation vs
      saturation), and correct trap behavior.
    hazards: [H-1]
    spec-baseline: "WebAssembly Core Specification 3.0"

  - id: SC-2
    title: Peephole optimization must not change observable behavior
    description: >
      Every peephole optimization rewrite shall produce an instruction
      sequence that is semantically equivalent to the original for all
      possible inputs. Flag-setting side effects, memory ordering, and
      exception behavior shall be preserved. Each rewrite shall be
      verified by Rocq proof or Z3 equivalence check.
    hazards: [H-2]
    spec-baseline: "WebAssembly Core Specification 3.0"

  - id: SC-3
    title: Memory bounds checks must be correct when enabled
    description: >
      When bounds checking is enabled, every memory load and store shall
      be preceded by a bounds check that compares the effective address
      plus access size against the linear memory size. The check shall
      trap (branch to trap handler) if the access is out of bounds. No
      bounds check shall be elided unless formally proven unnecessary.
    hazards: [H-3]

  - id: SC-4
    title: Generated ARM code must be valid for the target ISA variant
    description: >
      Every ARM instruction in the compiled output shall be valid for the
      target Cortex-M variant specified in the target profile. No Thumb-2
      instruction shall appear in output for Thumb-1-only targets. No VFP
      instruction shall appear for targets without FPU. No unaligned
      access shall be emitted for strict-alignment targets. Immediate
      values shall fit within the encoding format.
    hazards: [H-4]
    spec-baseline: "ARM Architecture Reference Manual (ARMv6-M, ARMv7-M)"

  - id: SC-5
    title: Control flow translation must produce correct branch targets
    description: >
      All branch instructions in the compiled output shall target the
      correct code address. Block/loop/if/br/br_if translation shall
      produce correct label offsets. Condition codes shall match the
      WASM comparison semantics. Branch offset calculation shall account
      for Thumb instruction alignment and variable instruction widths.
    hazards: [H-5]
    spec-baseline: "WebAssembly Core Specification 3.0, Section 4.4.8"

  - id: SC-6
    title: Register allocation must preserve all live values
    description: >
      The register allocator shall not overwrite a register that is still
      needed by a subsequent instruction. Callee-saved registers (r4-r11,
      lr) shall be preserved across function calls. The virtual stack
      model shall accurately track which physical registers hold which
      WASM values at every point in the compiled code.
    hazards: [H-6]

  - id: SC-7
    title: ELF output must be well-formed for the target
    description: >
      The generated ELF binary shall have correct section headers, program
      headers, symbol table, and vector table. Section load addresses shall
      match the target's physical memory map. Memory regions shall not
      overlap. The vector table reset handler shall have the Thumb bit set.
      The binary shall load and execute correctly on the target hardware.
    hazards: [H-7]
    spec-baseline: "ELF for ARM Architecture (ARM IHI 0044)"

  - id: SC-8
    title: Meld dispatch ABI must match Kiln's implementation
    description: >
      The __meld_dispatch_import calling convention generated by Synth
      shall match Kiln's dispatch handler exactly. Import index register,
      argument order, and return value convention shall be consistent
      between the two projects. The ABI shall be defined in a shared
      specification and tested with cross-project integration tests.
    hazards: [H-8]

  - id: SC-9
    title: Verification must cover all deployed synthesis rules
    description: >
      Every synthesis rule used in production shall be verified by at
      least one of: Rocq proof (T1/T2), Z3 SMT check, or exhaustive
      property-based testing. Admitted proofs shall be tracked and their
      assumptions documented. Z3 timeouts shall be treated as unverified.
      No unverified rule shall be deployed without explicit sign-off.
    hazards: [H-9]

  - id: SC-10
    title: Canonical ABI implementation must agree with Meld and Kiln
    description: >
      Synth's synth-abi crate shall compute identical canonical ABI layouts
      (element sizes, field alignment, string encoding) as Meld's parser.rs
      and Kiln's kiln-component. Disagreement between any two tools is a
      blocking defect. Cross-tool consistency shall be verified by shared
      test fixtures.
    hazards: [H-10]
    spec-baseline: "Component Model commit deb0b0a, Canonical ABI"
